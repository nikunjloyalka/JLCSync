// EXECUTABLES — Quick day-to-day tasks
// ══════════════════════════════════════════════════════

let execEditId = null;
let _execTab = 'all'; // 'all' | 'mine' | 'unassigned'

function setExecTab(tab){
  _execTab = tab;
  updateExecTabCounts();
  renderExecutables();
}

function updateExecTabCounts(){
  const all = ls('ca_exec',[]);
  const allPending   = all.filter(e=>e.status!=='Done').length;
  const minePending  = all.filter(e=>e.status!=='Done'&&e.assignedTo===currentUser?.username).length;
  const unsnPending  = all.filter(e=>e.status!=='Done'&&!e.assignedTo).length;
  const tabs = {
    'all':        {label:'All',        count:allPending},
    'mine':       {label:'Mine',       count:minePending},
    'unassigned': {label:'Unassigned', count:unsnPending},
  };
  Object.entries(tabs).forEach(([key,{label,count}])=>{
    const btn=document.getElementById('execTab-'+key); if(!btn) return;
    const isActive = _execTab===key;
    btn.style.background = isActive ? 'var(--primary)' : 'transparent';
    btn.style.color = isActive ? '#fff' : 'var(--text2)';
    btn.innerHTML = label + (count>0
      ? `<span style="background:${isActive?'rgba(255,255,255,.25)':'var(--primary-light)'};color:${isActive?'#fff':'var(--primary)'};font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:4px">${count}</span>`
      : '');
  });
}

function renderExecutables(){
  const el=document.getElementById('execList'); if(!el) return;

  // Populate assignee filter dynamically
  const assigneeEl=document.getElementById('execAssigneeFilter');
  if(assigneeEl){
    const cur=assigneeEl.value;
    const users=getUsers();
    assigneeEl.innerHTML='<option value="">All Assignees</option>'
      +users.map(u=>`<option value="${u.username}"${cur===u.username?' selected':''}>${esc(u.name||u.username)}</option>`).join('');
  }

  const q=(document.getElementById('execSearch')?.value||'').toLowerCase();
  const filter=document.getElementById('execFilter')?.value||'';
  const assigneeFilter=document.getElementById('execAssigneeFilter')?.value||'';
  const all=ls('ca_exec',[]);
  const now=new Date(); now.setHours(0,0,0,0);

  let list=all.filter(e=>{
    // Slider tab filter
    if(_execTab==='mine' && !(e.team?.includes(currentUser?.username)||e.assignedTo===currentUser?.username)) return false;
    if(_execTab==='unassigned' && e.assignedTo) return false;
    // Search
    if(q && !(e.title||'').toLowerCase().includes(q) && !(e.remarks||'').toLowerCase().includes(q)) return false;
    // Status filter
    if(filter==='done' && e.status!=='Done') return false;
    if(filter==='pending' && e.status==='Done') return false;
    // Assignee filter
    if(assigneeFilter && !(e.team||[e.assignedTo]).includes(assigneeFilter)) return false;
    return true;
  });

  // Sort: overdue → due soonest → undated → done
  list.sort((a,b)=>{
    const aDone=a.status==='Done', bDone=b.status==='Done';
    if(aDone&&!bDone) return 1;
    if(!aDone&&bDone) return -1;
    const ad=a.dueDate?new Date(a.dueDate):null;
    const bd=b.dueDate?new Date(b.dueDate):null;
    if(!ad&&!bd) return 0;
    if(!ad) return 1;
    if(!bd) return -1;
    return ad-bd;
  });

  // Stat cards — context-aware: counts based on current active tab
  const srcAll   = all;
  const srcMine  = all.filter(e=>e.team?.includes(currentUser?.username)||e.assignedTo===currentUser?.username);
  const srcUnasn = all.filter(e=>!e.assignedTo);
  const src = _execTab==='mine' ? srcMine : _execTab==='unassigned' ? srcUnasn : srcAll;

  const sTotal   = src.length;
  const sPending = src.filter(e=>e.status!=='Done').length;
  const sOverdue = src.filter(e=>e.status!=='Done'&&e.dueDate&&new Date(e.dueDate)<now).length;
  const today_str= today();
  const sDueToday= src.filter(e=>e.status!=='Done'&&e.dueDate===today_str).length;

  const statsEl=document.getElementById('execStats');
  if(statsEl) renderStatCards('execStats',[
    {n:sTotal,   label:'Total'},
    {n:sPending, label:'Pending'},
    {n:sOverdue, label:'Overdue', alert:sOverdue>0},
    {n:sDueToday,label:'Due Today',alert:sDueToday>0},
  ]);

  if(!list.length){
    el.innerHTML=emptyState('⚡','No executables found',
      _execTab==='mine'?'No tasks assigned to you':
      _execTab==='unassigned'?'All tasks are assigned':
      (q||filter||assigneeFilter)?'Clear filters to see more':'Tap + to add a quick task');
    return;
  }

  const pendingItems=list.filter(e=>e.status!=='Done');
  const doneItems=list.filter(e=>e.status==='Done');

  el.innerHTML=[
    ...pendingItems.map(e=>execCard(e,now)),
    doneItems.length?`<details class="mt8"><summary style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;cursor:pointer;padding:6px 0">Completed (${doneItems.length})</summary><div style="margin-top:6px">${doneItems.map(e=>execCard(e,now)).join('')}</div></details>`:'',
  ].join('');
}

function execCard(e, now){
  const users = getUsers();
  const isDone = e.status === 'Done';
  const team = (e.team?.length ? e.team : (e.assignedTo ? [e.assignedTo] : [])).filter(Boolean);

  // Linked task label
  let linkedHtml = '';
  if(e.linkedType && e.linkedId){
    const src = e.linkedType==='litigation'
      ? ls('ca_cases',[]).find(c=>c.id===e.linkedId)
      : ls('ca_roc',[]).find(r=>r.id===e.linkedId);
    if(src){
      const label = e.linkedType==='litigation'
        ? `${src.client} — ${src.act} ${src.type||''}`
        : `${src.client} — ${src.form||''} ${src.fy||''}`;
      linkedHtml = `<span class="chip bg-light" style="color:var(--primary);cursor:pointer"
        onclick="openAppToRecord('${e.linkedType==='litigation'?'litigation':'roc'}','${e.linkedId}')">
        🔗 ${esc(label.trim())}</span>`;
    }
  }

  const meta = [
    e.dueDate ? dlBadge(e.dueDate) : '',
    linkedHtml,
    team.length ? mkTeamPills(team, users) : '',
  ];

  return `<div class="card mb8" style="opacity:${isDone?'0.6':'1'};border-left:3px solid ${isDone?'var(--border)':'var(--primary-mid)'}">
    <div class="flex-c gap10">
      <input type="checkbox" ${isDone?'checked':''} onchange="execToggleDone('${e.id}',this.checked)"
        style="width:18px;height:18px;cursor:pointer;accent-color:var(--primary);flex-shrink:0">
      <div style="flex:1;min-width:0;cursor:pointer" onclick="openExecModal('${e.id}')">
        <div class="tx1${isDone?' tx4':''}" style="${isDone?'text-decoration:line-through':''}">${esc(e.title||'')}</div>
        ${e.remarks ? `<div class="tx3 mt4 ellipsis">${esc(e.remarks)}</div>` : ''}
        <div class="flex-c gap6 mt4" style="flex-wrap:wrap">${meta.filter(Boolean).join('')}</div>
      </div>
      <button onclick="openExecModal('${e.id}')" class="btn btn-outline" style="padding:4px 8px;font-size:11px;flex-shrink:0">Edit</button>
    </div>
  </div>`;
}

function execToggleDone(id, checked){
  const items=ls('ca_exec',[]);
  const i=items.findIndex(e=>e.id===id); if(i<0) return;
  items[i]={...items[i], status:checked?'Done':'Pending', doneAt:checked?today():null};
  lsSet('ca_exec',items);
  updateExecTabCounts();
  renderExecutables();
  updateLauncherTabCounts();
  autoSync();
}

function openExecModal(id){
  execEditId = id||null;
  const item = id ? ls('ca_exec',[]).find(e=>e.id===id) : null;
  const cases = ls('ca_cases',[]); const roc = ls('ca_roc',[]);
  const users = getUsers();

  // Build select options for linked task
  const litOpts = cases.map(c=>`<option value="litigation|${c.id}" ${item?.linkedType==='litigation'&&item?.linkedId===c.id?'selected':''}>${esc(c.client)} — ${esc(c.act||'')} ${esc(c.type||'')} ${c.fy?'FY '+c.fy:''}</option>`).join('');
  const rocOpts = roc.map(r=>`<option value="roc|${r.id}" ${item?.linkedType==='roc'&&item?.linkedId===r.id?'selected':''}>${esc(r.client)} — ${esc(r.form||'')} ${r.fy?'FY '+r.fy:''}</option>`).join('');

  mkModal('execModal',`
    <div class="modal-hdr">
      <span>${item?'Edit Executable':'New Executable'}</span>
      <button class="modal-close" onclick="closeMdl('execModal')">✕</button>
    </div>
    <div class="fr"><label>Executable *</label>
      <input id="ex_title" placeholder="e.g. Send reply to GST notice for ABC" value="${esc(item?.title||'')}">
    </div>
    <div class="fr"><label>Remarks</label>
      <textarea id="ex_rem" rows="2" placeholder="Additional notes or context…">${esc(item?.remarks||'')}</textarea>
    </div>
    <div class="fr"><label>Due Date</label>
      <input type="date" id="ex_due" value="${item?.dueDate||''}">
    </div>
    <div class="fr"><label>Status</label>
      <select id="ex_status">
        <option value="Pending" ${(!item||item.status==='Pending')?'selected':''}>Pending</option>
        <option value="In Progress" ${item?.status==='In Progress'?'selected':''}>In Progress</option>
        <option value="Done" ${item?.status==='Done'?'selected':''}>Done</option>
      </select>
    </div>
    <div class="fr"><label>Link to Task <span class="opt-hint">(optional — auto-fills team)</span></label>
      <select id="ex_linked" onchange="execAutoFillTeam()">
        <option value="">-- Not linked to any task --</option>
        <optgroup label="Litigation">${litOpts}</optgroup>
        <optgroup label="ROC - Others">${rocOpts}</optgroup>
      </select>
    </div>
    <div class="fr"><label>Assign Team <span class="opt-hint">(auto-filled from task — editable)</span></label>
      <div id="ex_team_wrap" class="team-select"></div>
    </div>
    <div class="modal-actions">
      ${id?`<button class="btn btn-danger" onclick="execConfirmDelete()">🗑 Delete</button>`:''}
      <button class="btn btn-primary" onclick="execSave()" style="flex:1">Save</button>
      <button class="btn btn-outline" onclick="closeMdl('execModal')" style="flex:1">Cancel</button>
    </div>
  `);
  openMdl('execModal');
  // Build team wrap with existing team (backward compat with old assignedTo field)
  const initTeam = item?.team?.length ? item.team : (item?.assignedTo ? [item.assignedTo] : []);
  buildTeamWrap('ex_team_wrap', initTeam);
  // Auto-fill team from linked task if already linked
  if(item?.linkedType && item?.linkedId) execAutoFillTeam(false);
  setTimeout(()=>document.getElementById('ex_title')?.focus(), 100);
}

// ── Linked Executables in Task Modals ─────────────────────────────
function renderLinkedExecutables(taskType, taskId, containerId){
  const el = document.getElementById(containerId); if(!el) return;
  const execs = ls('ca_exec',[]).filter(e=>e.linkedType===taskType&&e.linkedId===taskId);
  if(!execs.length){ el.style.display='none'; return; }

  el.style.display = 'block';
  const pending = execs.filter(e=>e.status!=='Done').length;
  const users = getUsers();

  el.innerHTML = `
    <div class="flex-sb mb8">
      <div class="section-label">
        ⚡ Linked Executables
        ${pending ? mkBadge(pending+' pending','danger') : ''}
      </div>
      <button onclick="openExecModal(null)" class="btn btn-outline" style="font-size:11px;padding:3px 8px">+ Add</button>
    </div>
    ${execs.map(e=>{
      const isDone = e.status==='Done';
      const team = (e.team?.length?e.team:(e.assignedTo?[e.assignedTo]:[])).filter(Boolean);
      return `<div class="flex-c gap8" style="padding:7px 0;border-bottom:1px solid var(--border);${isDone?'opacity:.55':''}">
        <input type="checkbox" ${isDone?'checked':''} style="width:15px;height:15px;cursor:pointer;accent-color:var(--primary);flex-shrink:0"
          onchange="execToggleDone('${e.id}',this.checked);setTimeout(()=>renderLinkedExecutables('${taskType}','${taskId}','${containerId}'),80)">
        <div style="flex:1;min-width:0;cursor:pointer" onclick="openExecModal('${e.id}')">
          <div class="tx2${isDone?' tx4':''}" style="${isDone?'text-decoration:line-through':''}font-weight:${isDone?400:600}">${esc(e.title||'')}</div>
          ${e.remarks?`<div class="tx4">${esc(e.remarks)}</div>`:''}
          <div class="flex-c gap6 mt4" style="flex-wrap:wrap">
            ${e.dueDate?dlBadge(e.dueDate):''}
            ${team.length?mkTeamPills(team,users):''}
          </div>
        </div>
        ${mkBadge(e.status, statusColor(e.status))}
      </div>`;
    }).join('')}`;
}

function execToggleDoneInModal(execId, checked, taskType, taskId, containerId){
  execToggleDone(execId, checked);
  setTimeout(()=>renderLinkedExecutables(taskType, taskId, containerId), 50);
}
function execAutoFillTeam(overwrite=true){
  const val = document.getElementById('ex_linked')?.value||'';
  if(!val) return;
  const [type,id] = val.split('|');
  const src = type==='litigation' ? ls('ca_cases',[]).find(c=>c.id===id) : ls('ca_roc',[]).find(r=>r.id===id);
  if(!src?.team?.length) return;
  const wrap = document.getElementById('ex_team_wrap');
  if(!wrap) return;
  // Only auto-fill if team is currently empty or overwrite is true
  const current = getSelectedTeam('ex_team_wrap')||[];
  if(overwrite || !current.length){
    buildTeamWrap('ex_team_wrap', src.team);
    if(overwrite) toast('Team auto-filled from linked task ✓');
  }
}

function execSave(){
  const title=document.getElementById('ex_title').value.trim();
  if(!title){toast('Executable title is required');return;}
  const linkedVal=document.getElementById('ex_linked').value;
  const [linkedType,linkedId]=linkedVal?linkedVal.split('|'):['',''];
  const team = getSelectedTeam('ex_team_wrap')||[];
  const obj={
    title,
    remarks:    document.getElementById('ex_rem').value.trim(),
    dueDate:    document.getElementById('ex_due').value,
    assignedTo: team[0]||'', // keep single field for backward compat with filter
    team,
    status:     document.getElementById('ex_status').value,
    linkedType: linkedType||null,
    linkedId:   linkedId||null,
  };
  let items=ls('ca_exec',[]);
  const now=today();
  if(execEditId){
    const i=items.findIndex(e=>e.id===execEditId);
    items[i]={...items[i],...obj,updatedAt:now};
    toast('Executable updated ✓');
  } else {
    items.unshift({id:'EX'+Date.now(),...obj,createdAt:now,updatedAt:now});
    toast('Executable added ✓');
  }
  lsSet('ca_exec',items);
  closeMdl('execModal');
  updateExecTabCounts();
  renderExecutables();
  updateLauncherTabCounts();
  autoSync();
}

function execConfirmDelete(){
  showConfirm('Delete this executable?',()=>{
    const items=ls('ca_exec',[]).filter(e=>e.id!==execEditId);
    _mem.ca_exec=items;
    if(_dbOK) dbDelete('ca_exec',execEditId);
    closeMdl('execModal');
    updateExecTabCounts();
    renderExecutables();
    updateLauncherTabCounts();
    toast('Deleted ✓');
  });
}

// ══════════════════════════════════════════════════════
// SPLIT VIEW
// ══════════════════════════════════════════════════════
let _splitView = localStorage.getItem('ca_splitView') === '1';
let _splitTab  = 'exec';

function toggleLauncherView(){
  _splitView = !_splitView;
  localStorage.setItem('ca_splitView', _splitView?'1':'0');
  applyLauncherView();
  if(_splitView) setSplitTab(_splitTab||'exec');
  else { restoreClassicView(); _switchLauncherTabBase(_splitTab||'exec'); }
}

function applyLauncherView(){
  const classic = document.getElementById('launcherClassic');
  const split   = document.getElementById('launcherSplit');
  const btn     = document.getElementById('viewToggleBtn');
  if(!classic||!split) return;
  classic.style.display = _splitView ? 'none' : 'block';
  split.style.display   = _splitView ? 'flex'  : 'none';
  if(btn){ btn.innerHTML = _splitView ? '☰ Classic View' : '⊞ Split View'; }
}

function setSplitTab(tab){
  _splitTab = tab;
  // Update sidebar highlight
  document.querySelectorAll('.launcher-sidebar-item').forEach(el=>{
    el.classList.toggle('active', el.id==='stab-'+tab);
  });
  // Sync hello text
  const sh=document.getElementById('splitHello');
  const lh=document.getElementById('launchHello');
  if(sh&&lh) sh.textContent=lh.textContent;
  // Move the correct lview panel into the split content area
  const panel = document.getElementById('splitContent');
  if(!panel) return;
  // Hide all lview panels, detach from classic body temporarily
  const tabs=['exec','apps','mine','clients','deleted'];
  tabs.forEach(t=>{
    const v=document.getElementById('lview-'+t); if(!v) return;
    if(t===tab){
      v.style.display='block';
      if(v.parentElement!==panel) panel.appendChild(v);
    } else {
      v.style.display='none';
      // Keep in panel (not needed elsewhere when in split mode)
    }
  });
  // Trigger render
  if(tab==='exec'){ updateExecTabCounts(); renderExecutables(); }
  else if(tab==='apps') buildAppsGrid();
  else if(tab==='mine') renderLauncherMyTasks();
  else if(tab==='clients'){ updateClientTabButtons(); renderLauncherClients(); }
  else if(tab==='deleted') renderDeletedTasks();
  updateSplitBadges();
  updateLauncherTabCounts();
}

function restoreClassicView(){
  // Move lview panels back into launcherClassic when switching back
  const classic = document.getElementById('launcherClassic');
  if(!classic) return;
  const tabs=['exec','apps','mine','clients','deleted'];
  tabs.forEach(t=>{
    const v=document.getElementById('lview-'+t); if(!v) return;
    if(v.parentElement!==classic) classic.appendChild(v);
    v.style.display = t==='apps' ? 'block' : 'none';
  });
}

function updateSplitBadges(){
  const exec    = ls('ca_exec',[]);
  const cases   = ls('ca_cases',[]);
  const roc     = ls('ca_roc',[]);
  const clients = ls('ca_clients',[]).length;
  const delCount= ls('ca_deleted_lit',[]).length+ls('ca_deleted_roc',[]).length;
  const myTasks = cases.filter(c=>(c.team||[]).includes(currentUser?.username)).length
                + roc.filter(r=>(r.team||[]).includes(currentUser?.username)).length;
  const execPending = exec.filter(e=>e.status!=='Done').length;
  const set=(id,n)=>{ const el=document.getElementById('sbadge-'+id); if(!el) return; el.textContent=n||''; el.style.display=n?'':'none'; };
  set('exec',    execPending||'');
  set('mine',    myTasks||'');
  set('clients', clients);
  set('deleted', delCount||'');
}

//   • Home screen tile (icon, name, description)
//   • FAB context menu
//   • Admin-only gating

const APPS = [
  { id:'litigation', name:'Litigation',   icon:'⚖️',  desc:'GST & IT cases, hearings',     load:loadLitigationApp },
  { id:'roc',        name:'ROC - Others', icon:'🏛️',  desc:'MCA forms, compliance filings', load:loadRocApp },
  { id:'setup',      name:'Setup',        icon:'⚙️',  desc:'Users, OneDrive, data',         load:loadSetupApp, adminOnly:true },
];

function initUsers(){ if(!getUsers().length) setUsers([{username:'admin',password:'admin123',name:'Administrator',role:'admin'}]); }

function _showLauncherBase(){
  showScreen('s-launcher');
  const mf=document.getElementById('_multiFab'); if(mf){ mf.style.display='flex'; _fabPrimaryAction=null; }
  const hr=new Date().getHours();
  const greet=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
  document.getElementById('launchHello').textContent=greet+', '+(currentUser.name.split(' ')[0]);
  document.getElementById('launchUser').textContent=currentUser.name+(currentUser.role==='admin'?' (Admin)':'');
  buildAppsGrid();
  tryAutoSignIn();
  updateLauncherTabCounts();
}

function buildAppsGrid(){
  const grid=document.getElementById('appsGrid'); if(!grid) return;
  const isAdmin=currentUser?.role==='admin';
  grid.innerHTML=APPS.filter(a=>!a.adminOnly||isAdmin).map(a=>`
    <div class="app-card" onclick="openApp('${a.id}')">
      <div class="app-icon">${a.icon}</div>
      <div class="app-name">${a.name}</div>
      <div class="app-desc">${a.desc}</div>
    </div>`).join('');
}

function openApp(id){
  const app=APPS.find(a=>a.id===id); if(!app) return;
  if(app.adminOnly && currentUser?.role!=='admin'){ toast('Admin access only'); return; }
  currentAppId=id;
  document.getElementById('appNavTitle').textContent=app.name;
  showScreen('s-app');
  app.load();
}

function backToLauncher(){ unloadApp(); showLauncher(); switchLauncherTab('apps'); }

function unloadApp(){
  currentAppId=null;
  document.querySelectorAll('.modal-bg[data-dynamic]').forEach(m=>m.remove());
  _fabPrimaryAction=null; // reset primary action on app unload
  document.getElementById('appMount').innerHTML='';
}

// Open the app, then after it loads open the specific record modal
function openAppToRecord(appId, recordId){
  openApp(appId);
  // Wait for app to render then open the record
  setTimeout(()=>{
    if(appId==='litigation') litOpenModal(recordId);
    if(appId==='roc') rocOpenModal(recordId);
  }, 150);
}


// ── Change detection for modals ─────────────────────────────────────
let _litSnapshot = null;
let _rocSnapshot = null;

function litSnapshot(){
  return {
    client: document.getElementById('fc_client')?.value||'',
    clientId: document.getElementById('fc_client')?.dataset.clientId||'',
    act: document.getElementById('fc_act')?.value||'',
    type: document.getElementById('fc_type')?.value||'',
    desc: document.getElementById('fc_desc')?.value||'',
    status: document.getElementById('fc_status')?.value||'',
    dl: document.getElementById('fc_dl')?.value||'',
    auth: document.getElementById('fc_auth')?.value||'',
    amt: document.getElementById('fc_amt')?.value||'',
    pay: document.getElementById('fc_pay')?.value||'',
    rem: document.getElementById('fc_rem')?.value||'',
    fy: document.getElementById('fc_fy')?.value||'',
    fyFrom: document.getElementById('fc_fyFrom')?.value||'',
    fyTo: document.getElementById('fc_fyTo')?.value||'',
    inspDate: document.getElementById('fc_inspDate')?.value||'',
    team: JSON.stringify(getSelectedTeam('fc_team_wrap')||[]),
  };
}
function rocSnapshot(){
  return {
    client: document.getElementById('fr_client')?.value||'',
    clientId: document.getElementById('fr_client')?.dataset.clientId||'',
    fy: document.getElementById('fr_fy')?.value||'',
    form: document.getElementById('fr_form')?.value||'',
    desc: document.getElementById('fr_desc')?.value||'',
    status: document.getElementById('fr_status')?.value||'',
    due: document.getElementById('fr_due')?.value||'',
    filed: document.getElementById('fr_filed')?.value||'',
    srn: document.getElementById('fr_srn')?.value||'',
    fee: document.getElementById('fr_fee')?.value||'',
    rem: document.getElementById('fr_rem')?.value||'',
    team: JSON.stringify(getSelectedTeam('fr_team_wrap')||[]),
  };
}
function snapshotEq(a,b){ return JSON.stringify(a)===JSON.stringify(b); }

function litCheckDirty(){
  if(!litEditId){setSaveBtnState('caseSaveBtn',true);return;}
  const dirty = !snapshotEq(litSnapshot(), _litSnapshot);
  setSaveBtnState('caseSaveBtn', dirty);
}
function rocCheckDirty(){
  if(!rocEditId){setSaveBtnState('rocSaveBtn',true);return;}
  const dirty = !snapshotEq(rocSnapshot(), _rocSnapshot);
  setSaveBtnState('rocSaveBtn', dirty);
}
function setSaveBtnState(btnId, enabled){
  const btn=document.getElementById(btnId); if(!btn) return;
  btn.disabled = !enabled;
  btn.style.opacity = enabled?'1':'0.45';
  btn.style.cursor = enabled?'pointer':'not-allowed';
}

document.getElementById('profileModal').addEventListener('click', e=>{ if(e.target===document.getElementById('profileModal')) closeMdl('profileModal'); });
document.getElementById('clientModal').addEventListener('click',  e=>{ if(e.target===document.getElementById('clientModal'))  closeMdl('clientModal');  });

// ╔══ SECTION: BOOT SEQUENCE ═══════════════════════════════════════╗
function bootApp(){
  const hint     = document.getElementById('loginSyncStatus');
  const loginBtn = document.querySelector('#s-login .btn-primary');

  // Always show login screen on load — no session restore
  showScreen('s-login');
  if(hint) hint.textContent = '⏳ Connecting…';
  if(loginBtn){ loginBtn.textContent='Connecting…'; loginBtn.disabled=true; loginBtn.style.opacity='0.6'; }

  loadFirebase(async()=>{
    if(hint) hint.textContent = '⏳ Loading data…';

    // Load ALL data fresh from D1
    try{
      const [cases, roc, clients, users, optsDocs, delLit, delRoc, execData] = await Promise.all([
        dbGet('ca_cases'),
        dbGet('ca_roc'),
        dbGet('ca_clients'),
        dbGet('ca_users'),
        dbGet('ca_opts_doc'),
        dbGet('ca_deleted_lit'),
        dbGet('ca_deleted_roc'),
        dbGet('ca_exec'),
      ]);
      _mem.ca_cases       = cases;
      _mem.ca_roc         = roc;
      _mem.ca_clients     = clients;
      _mem.ca_users       = users;
      _mem.ca_deleted_lit = delLit;
      _mem.ca_deleted_roc = delRoc;
      _mem.ca_exec        = execData||[];
      if(optsDocs && optsDocs[0]){ const {_fbId,...o}=optsDocs[0]; _mem.ca_opts=o; }
    }catch(e){ console.error('Boot load error',e); }

    initUsers();

    // Enable login button — user must sign in
    if(loginBtn){ loginBtn.textContent='Sign In'; loginBtn.disabled=false; loginBtn.style.opacity='1'; }
    if(hint){ hint.textContent='✅ Ready'; setTimeout(()=>{ hint.textContent=''; }, 2000); }

    // Subscribe to real-time changes
    dbSubscribe('ca_cases', ()=>{
      if(currentAppId==='litigation') litRenderAll();
      const lvm=document.getElementById('lview-mine'); if(lvm&&lvm.style.display!=='none') renderLauncherMyTasks();
      if(currentUser) updateLauncherTabCounts();
    });
    dbSubscribe('ca_roc', ()=>{
      if(currentAppId==='roc') rocRenderAll();
      const lvm2=document.getElementById('lview-mine'); if(lvm2&&lvm2.style.display!=='none') renderLauncherMyTasks();
      if(currentUser) updateLauncherTabCounts();
    });
    dbSubscribe('ca_clients', ()=>{
      const lvc=document.getElementById('lview-clients'); if(lvc&&lvc.style.display!=='none') renderLauncherClients();
      if(currentUser) updateLauncherTabCounts();
    });
    dbSubscribe('ca_users', d=>{
      _mem.ca_users=d;
      if(document.getElementById('caseModal')?.classList.contains('open')){
        const w=document.getElementById('fc_team_wrap'); if(w&&w._render) w._render();
      }
      if(document.getElementById('rocModal')?.classList.contains('open')){
        const w=document.getElementById('fr_team_wrap'); if(w&&w._render) w._render();
      }
    });
    dbSubscribe('ca_opts_doc', d=>{ if(d&&d[0]){ const {_fbId,...o}=d[0]; _mem.ca_opts=o; } });
    dbSubscribe('ca_exec', ()=>{
      const lve=document.getElementById('lview-exec'); if(lve&&lve.style.display!=='none') renderExecutables();
      if(currentUser) updateLauncherTabCounts();
    });
    dbSubscribe('ca_deleted_lit', ()=>{
      const ld=document.getElementById('lview-deleted'); if(ld&&ld.style.display!=='none') renderDeletedTasks();
      if(currentUser) updateLauncherTabCounts();
    });
    dbSubscribe('ca_deleted_roc', ()=>{
      const ld=document.getElementById('lview-deleted'); if(ld&&ld.style.display!=='none') renderDeletedTasks();
      if(currentUser) updateLauncherTabCounts();
    });

    if(proxyUrl){ accessToken='proxy'; startPoll(); }
    setTimeout(applyLauncherView, 0);
  });
}


function showLoginOrRestore(){
  showScreen('s-login'); // always require login — no session restore
}

// autoSync — D1 writes happen instantly in lsSet()
// This just keeps Excel in sync as a backup/reporting copy
function autoSync(){
  if(proxyUrl && accessToken){
    clearTimeout(_syncTimer);
    _syncTimer = setTimeout(()=>{
      loadXLSX(async()=>{ try{ await _pushToExcel(); }catch(e){ console.error('Excel sync',e); } });
    }, 3000);
  }
}



// ══════════════════════════════════════════════════════════════════
// PWA INSTALL — works on Chrome desktop + Android
// On iOS Safari: user must use Share → Add to Home Screen manually
// ══════════════════════════════════════════════════════════════════
let _pwaPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _pwaPrompt = e;
  // Show install button in nav when app is installable
  const btn = document.getElementById('pwaInstallBtn');
  if(btn) btn.style.display = 'flex';
});

window.addEventListener('appinstalled', () => {
  _pwaPrompt = null;
  const btn = document.getElementById('pwaInstallBtn');
  if(btn) btn.style.display = 'none';
  toast('JLC Sync installed successfully ✓');
});

function triggerPWAInstall(){
  if(_pwaPrompt){
    _pwaPrompt.prompt();
    _pwaPrompt.userChoice.then(r=>{
      if(r.outcome==='accepted') toast('Installing JLC Sync…');
      _pwaPrompt = null;
      const btn=document.getElementById('pwaInstallBtn');
      if(btn) btn.style.display='none';
    });
  } else {
    // Show manual install instructions
    showPWAInstructions();
  }
}

function showPWAInstructions(){
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const isAndroid = /Android/.test(navigator.userAgent);
  const msg = isIOS
    ? `<b>Install on iPhone/iPad:</b><br><br>1. Tap the <b>Share</b> button (□↑) at the bottom of Safari<br>2. Scroll down and tap <b>Add to Home Screen</b><br>3. Tap <b>Add</b>`
    : isAndroid
    ? `<b>Install on Android:</b><br><br>1. Tap the <b>⋮ menu</b> in Chrome<br>2. Tap <b>Add to Home Screen</b> or <b>Install App</b><br>3. Tap <b>Install</b>`
    : `<b>Install on Desktop (Chrome):</b><br><br>1. Click the <b>⊕ install icon</b> in the address bar (right side)<br>2. Click <b>Install</b><br><br><b>Or:</b> Chrome menu → <b>Save and share</b> → <b>Install page as app</b>`;
  showAlert('Install JLC Sync', `<div style="line-height:1.7;font-size:14px">${msg}</div>
    <div style="margin-top:16px;padding:12px;background:var(--primary-light);border-radius:8px;font-size:12px;color:var(--text2)">
      💡 Once installed, JLC Sync appears as an app on your device — no browser bar, full screen, works offline for viewing.
    </div>`);
}

// ── Split-view aware wrappers ─────────────────────────────────────
function showLauncher(){
  _showLauncherBase();
  applyLauncherView();
  updateSplitBadges();
  if(_splitView) setSplitTab(_splitTab||'exec');
}
function switchLauncherTab(tab){
  _splitTab = tab;
  if(_splitView){ setSplitTab(tab); return; }
  restoreClassicView();
  _switchLauncherTabBase(tab);
}

bootApp();
