<!DOCTYPE html>
<!--
╔══════════════════════════════════════════════════════════════════╗
║                     JLC SYNC — DEPLOYMENT GUIDE                 ║
╠══════════════════════════════════════════════════════════════════╣
║                                                                  ║
║  OPTION 1 — LOCAL (Zero cost, works offline)                     ║
║  ─────────────────────────────────────────────────────────────  ║
║  1. Save this HTML file to a shared network folder or USB        ║
║  2. Every staff member opens it directly in Chrome/Edge          ║
║  3. Data saves in browser localStorage (per device)              ║
║  ⚠ Data is per-device only — no real-time sharing               ║
║                                                                  ║
║  OPTION 2 — GITHUB PAGES (Free, shared, always up-to-date)      ║
║  ─────────────────────────────────────────────────────────────  ║
║  1. Create a free account at github.com                          ║
║  2. New repository → name it "jlc-sync" → Public                ║
║  3. Upload this file, rename it to "index.html"                  ║
║  4. Settings → Pages → Source: main branch, / (root)            ║
║  5. Your app is live at: https://[yourname].github.io/jlc-sync   ║
║  6. Bookmark that URL on all staff devices                       ║
║  ✓ Free forever · No server needed · Updates instantly           ║
║  ⚠ Data still per-device unless OneDrive sync is connected       ║
║                                                                  ║
║  OPTION 3 — NETLIFY DROP (Easiest, 30 seconds)                   ║
║  ─────────────────────────────────────────────────────────────  ║
║  1. Go to app.netlify.com/drop                                   ║
║  2. Drag and drop this HTML file                                 ║
║  3. You get a URL like: https://abc123.netlify.app               ║
║  4. Optionally set a custom domain in Netlify settings           ║
║  ✓ Free · Instant · Custom domain support                        ║
║                                                                  ║
║  OPTION 4 — COMPANY SERVER (Full control)                        ║
║  ─────────────────────────────────────────────────────────────  ║
║  Place index.html in any web server's public folder              ║
║  (IIS, Apache, Nginx, even a Node.js static server)              ║
║  Access via your internal IP or domain name                      ║
║                                                                  ║
║  ONEDRIVE SYNC SETUP (for shared data across devices)            ║
║  ─────────────────────────────────────────────────────────────  ║
║  1. Go to portal.azure.com → Azure Active Directory              ║
║  2. App registrations → New registration                         ║
║     Name: JLC Sync · Account type: Any org dir + personal        ║
║     Redirect URI: Web → your app URL (from above)                ║
║  3. Authentication → Enable "Access tokens" & "ID tokens"        ║
║  4. API permissions → Add: Files.ReadWrite + User.Read           ║
║     (Microsoft Graph, Delegated)                                  ║
║  5. Copy the Application (client) ID                             ║
║  6. In JLC Sync → Setup → OneDrive → paste the Client ID         ║
║  7. Click Save & Connect — sign in with your Microsoft account   ║
║  ✓ All data syncs to OneDrive as JLCSync_Master.xlsx + folder docs     ║
║                                                                  ║
║  MULTI-USER SETUP                                                ║
║  ─────────────────────────────────────────────────────────────  ║
║  1. Deploy via Option 2 or 3 (same URL for everyone)             ║
║  2. Login: admin / admin123 (change this immediately!)           ║
║  3. Setup → Users → add each staff member                        ║
║  4. Each staff logs in with their own credentials                 ║
║  5. Admin sees Setup + Field Options; Staff see apps only         ║
║                                                                  ║
║  ADDING A NEW APP MODULE                                         ║
║  ─────────────────────────────────────────────────────────────  ║
║  1. Add to APP_REGISTRY: { id, name, icon, desc, load:fn }       ║
║  2. Write loadXxxApp() following the Litigation/ROC pattern:     ║
║     - inject(html) for the page structure                        ║
║     - mkModal(id, html) for the add/edit modal                   ║
║     - mkFab(fn) for the + button                                 ║
║     - xxxRenderAll() calling stats + list + other sub-renders    ║
║  3. Add a sheet to getExcelSheets() with headers, getRows,       ║
║     applyRow, storageKey                                         ║
║  4. Add its OneDrive folder in setupOD() if docs needed          ║
║                                                                  ║
╚══════════════════════════════════════════════════════════════════╝
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,viewport-fit=cover">
<meta name="theme-color" content="#1a3a5c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JLC Sync">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>JLC Sync</title>
<style>
:root{
  --primary:#1a3a5c;--primary-mid:#2a5298;--primary-light:#e6eef8;
  --accent:#c8a558;--accent-light:#fdf6e3;
  --success:#2d6a4f;--success-light:#e8f5ef;
  --danger:#c0392b;--danger-light:#fdecea;
  --warn:#d97706;--warn-light:#fef3c7;
  --surface:#fff;--bg:#f4f6fb;--border:#dde3ef;
  --text:#1a2340;--text2:#5a6a82;--text3:#9aabbe;
  --r:10px;--shadow:0 2px 12px rgba(26,58,92,.1);
  --font:'Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* ── LOGIN ── */
#s-login{background:linear-gradient(135deg,var(--primary) 0%,#2a5298 100%);display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{background:#fff;border-radius:18px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 16px 56px rgba(0,0,0,.3)}
.login-logo{font-size:32px;font-weight:800;color:var(--primary);text-align:center;margin-bottom:2px}
.login-logo span{color:var(--accent)}
.login-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:28px}
.login-err{background:var(--danger-light);color:var(--danger);border-radius:7px;padding:8px 12px;font-size:13px;margin-bottom:14px;display:none}

/* ── LAUNCHER ── */

/* ── SPLIT VIEW ─────────────────────────────────────────────────── */
.launcher-split{display:flex;height:calc(100vh - 58px);overflow:hidden}
.launcher-sidebar{width:220px;flex-shrink:0;background:var(--primary);display:flex;flex-direction:column;overflow-y:auto;padding:12px 0}
.launcher-sidebar-item{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;color:rgba(255,255,255,.7);font-size:13px;font-weight:600;transition:all .15s;border-left:3px solid transparent;margin:1px 0}
.launcher-sidebar-item:hover{background:rgba(255,255,255,.08);color:#fff}
.launcher-sidebar-item.active{background:rgba(255,255,255,.15);color:#fff;border-left-color:var(--accent)}
.launcher-sidebar-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.launcher-sidebar-label{flex:1}
.launcher-sidebar-badge{background:var(--accent);color:var(--primary);font-size:10px;font-weight:800;padding:1px 6px;border-radius:8px;min-width:18px;text-align:center}
.launcher-sidebar-badge.subtle{background:rgba(255,255,255,.2);color:#fff}
.launcher-sidebar-hello{padding:14px 18px 10px;font-size:12px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.8px;font-weight:700}
.launcher-split-content{flex:1;overflow-y:auto;padding:24px 28px;background:var(--bg)}
.view-toggle-btn{background:rgba(255,255,255,.12);border:none;color:#fff;padding:5px 10px;border-radius:6px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px}
.view-toggle-btn:hover{background:rgba(255,255,255,.22)}
@media(max-width:600px){.launcher-sidebar{width:60px}.launcher-sidebar-label,.launcher-sidebar-hello,.launcher-sidebar-badge{display:none}.launcher-sidebar-item{padding:12px 0;justify-content:center}.launcher-split-content{padding:16px 12px}}

#s-launcher{background:var(--bg)}
.launcher-nav{background:var(--primary);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between}
.launcher-logo{color:#fff;font-size:18px;font-weight:700}
.launcher-logo span{color:var(--accent)}
.launcher-user{font-size:12px;color:rgba(255,255,255,.65)}
.launcher-body{max-width:900px;margin:0 auto;padding:32px 20px}
.launcher-hello{font-size:22px;font-weight:700;color:var(--primary);margin-bottom:4px}
.launcher-sub{font-size:14px;color:var(--text2);margin-bottom:28px}
.apps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.app-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:24px 20px;cursor:pointer;transition:all .2s;text-align:center;position:relative;box-shadow:var(--shadow)}
.app-card:hover{border-color:var(--primary-mid);box-shadow:0 4px 24px rgba(42,82,152,.15);transform:translateY(-2px)}
.app-card.add{border-style:dashed;background:transparent;box-shadow:none}
.app-card.add:hover{background:var(--surface)}
.app-icon{font-size:40px;margin-bottom:12px}
.app-name{font-size:15px;font-weight:700;color:var(--text)}
.app-desc{font-size:12px;color:var(--text2);margin-top:4px}
.app-badge{position:absolute;top:10px;right:10px;background:var(--danger);color:#fff;border-radius:20px;font-size:10px;font-weight:700;padding:2px 7px}

/* ── APP SHELL ── */
#s-app{background:var(--bg)}
.app-nav{background:var(--primary);padding:0 16px;display:flex;align-items:center;height:52px;gap:10px;position:sticky;top:0;z-index:100}
.app-nav-back{background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 12px;border-radius:6px;font-size:13px;cursor:pointer;white-space:nowrap}
.app-nav-title{color:#fff;font-size:15px;font-weight:700;flex:1;padding-left:4px}
.app-nav-title span{color:var(--accent)}
.nav-btn{background:rgba(255,255,255,.12);border:none;color:#fff;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;white-space:nowrap}
.nav-btn.accent{background:var(--accent);color:var(--primary);font-weight:600}
#appMount{min-height:calc(100vh - 52px)}

/* ── SHARED UI ── */
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:12px 20px;font-size:13px;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s}
.tab.active{color:var(--primary-mid);border-bottom-color:var(--primary-mid)}
.page{display:none;padding:16px;max-width:900px;margin:0 auto}.page.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
.b-gst{background:var(--primary-light);color:var(--primary)}.b-it{background:var(--accent-light);color:#7a4f00}
.b-open{background:var(--success-light);color:var(--success)}.b-hearing{background:#fff0e6;color:#b34700}
.b-replied{background:#e0f2fe;color:#0369a1}.b-payment{background:#fef9c3;color:#854d0e}
.b-closed{background:#f0f0f0;color:#666}.b-sub{background:#f3e8ff;color:#6b21a8}
.b-filed{background:var(--success-light);color:var(--success)}.b-pending{background:var(--warn-light);color:var(--warn)}
.b-overdue{background:var(--danger-light);color:var(--danger)}.b-client{background:#f3e8ff;color:#6b21a8}
.case-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
.dl-red{color:var(--danger);font-weight:700}.dl-warn{color:var(--warn);font-weight:600}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.stat-num{font-size:26px;font-weight:700;color:var(--primary)}.stat-lbl{font-size:11px;color:var(--text2);margin-top:2px}
.btn{border:none;border-radius:6px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn-primary{background:var(--primary-mid);color:#fff}.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--primary-mid);color:var(--primary-mid)}.btn-danger{background:var(--danger-light);color:var(--danger);border:1px solid #f5c6c6}
.fab{position:fixed;bottom:24px;right:20px;width:54px;height:54px;border-radius:50%;background:var(--primary-mid);color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 18px rgba(42,82,152,.35);display:none;align-items:center;justify-content:center;z-index:200;transition:transform .2s,background .2s}
.fab:hover{background:var(--primary);transform:scale(1.08)}
.fab-menu{position:fixed;bottom:88px;right:20px;display:none;flex-direction:column;gap:8px;align-items:flex-end;z-index:199}
.fab-item{display:flex;align-items:center;gap:10px;cursor:pointer;animation:fabIn .15s ease}
.fab-item-btn{height:42px;padding:0 16px;border-radius:21px;background:var(--primary);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 3px 12px rgba(42,82,152,.3);white-space:nowrap}
.fab-item-btn:hover{background:var(--primary-mid)}
.fab-overlay{position:fixed;inset:0;z-index:198;display:none}
@keyframes fabIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(20,36,60,.55);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto}
.modal-hdr{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:var(--bg);border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;color:var(--text2)}
.fr{margin-bottom:14px}.fr2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
input,select,textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:14px;color:var(--text);background:var(--surface);outline:none;font-family:var(--font);transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--primary-mid);box-shadow:0 0 0 3px rgba(42,82,152,.1)}
textarea{resize:vertical;min-height:70px}.modal-actions{display:flex;gap:8px;margin-top:14px}
.fchip{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .15s;user-select:none}
.fchip.active{background:var(--primary-mid);color:#fff;border-color:var(--primary-mid)}
.search-box{padding:9px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;font-family:var(--font)}
.search-box:focus{border-color:var(--primary-mid)}
.opts-list{display:flex;flex-direction:column;gap:4px}
.opt-row{display:flex;align-items:center;gap:6px;background:var(--bg);border-radius:6px;padding:7px 10px}
.opt-label{flex:1;font-size:13px}.opt-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:2px 5px;line-height:1}
.opt-btn:hover{color:var(--primary-mid)}.opt-btn.del:hover{color:var(--danger)}
.user-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.doc-link{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none}
.doc-word{background:#e8f0fe;color:#1a3a9c}.doc-folder{background:#fff8e1;color:#7a5000}
.team-select{position:relative;z-index:auto}
.team-display{display:flex;align-items:center;flex-wrap:wrap;gap:6px;padding:8px 10px;border:1px solid var(--border);border-radius:7px;background:var(--surface);cursor:pointer;min-height:40px;transition:border .15s}
.team-display:hover{border-color:var(--primary-mid)}
.team-dropdown{position:static;margin-top:4px;background:var(--surface);border:1px solid var(--primary-mid);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:1;max-height:200px;overflow-y:auto}
.team-option{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;transition:background .1s}
.team-option:hover{background:var(--bg)}
.team-option.selected{background:var(--primary-light)}
.team-option .team-check{font-size:14px;color:var(--primary-mid);font-weight:700;width:16px;text-align:center}
.team-avatar{width:22px;height:22px;border-radius:50%;background:var(--primary-mid);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.team-pill-sm{display:inline-flex;align-items:center;gap:5px;background:var(--primary-light);color:var(--primary);border-radius:20px;padding:2px 8px;font-size:12px;font-weight:600}
.csug-box{display:none;position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--primary-mid);border-top:none;border-radius:0 0 8px 8px;z-index:400;max-height:180px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.csug-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border)}
.csug-item:hover{background:var(--bg)}
.csug-code{display:inline-block;font-size:10px;font-weight:700;color:var(--primary-mid);background:var(--primary-light);padding:1px 6px;border-radius:8px;margin-right:4px}
.empty{text-align:center;padding:48px 24px;color:var(--text2)}.empty-icon{font-size:48px;margin-bottom:12px}
.empty h3{font-size:15px;font-weight:600;color:var(--text)}.empty p{font-size:13px;margin-top:4px}
.toast{position:fixed;bottom:90px;right:16px;background:var(--primary);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
@media(min-width:600px){.modal-bg{align-items:center}.modal{border-radius:14px}.page{padding:20px 24px}}

/* ── Shared utility classes ── */
.row{display:flex;align-items:center;gap:10px}
.row-sb{display:flex;align-items:center;justify-content:space-between;gap:10px}
.col{display:flex;flex-direction:column;gap:4px}
.grow{flex:1;min-width:0}
.shrink{flex-shrink:0}
.mono{font-family:monospace;font-size:11px}
.avatar{border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.avatar-sm{width:34px;height:34px;font-size:10px}
.avatar-md{width:42px;height:42px;font-size:13px}
.avatar-rnd{border-radius:50%}
.path-hint{font-size:10px;color:var(--text3);margin-top:3px}
.meta-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px;align-items:center}
.code-pill{font-size:11px;font-weight:700;color:var(--primary-mid);background:var(--primary-light);padding:1px 7px;border-radius:10px}
.dl-urgent{color:var(--danger);font-weight:700}
.dl-warn{color:var(--warn);font-weight:600}
.section-hdr{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}

/* ── Mobile improvements ── */
@media(max-width:480px){
  .ptab{padding:8px 12px;font-size:12px}
  .tab{padding:10px 14px;font-size:12px}
  .page{padding:12px}
  .fr2{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(3,1fr)}
  .stat-num{font-size:20px}
  .modal{padding:16px}
  .modal-hdr{font-size:15px}
  .launcher-body{padding:20px 14px}
  .apps-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .app-card{padding:18px 14px}
  .app-icon{font-size:30px;margin-bottom:8px}
  .app-name{font-size:13px}
  .nav-btn{padding:5px 8px;font-size:11px}
  .fab{bottom:16px;right:14px;width:48px;height:48px;font-size:22px}
  .fab-menu{bottom:74px;right:14px}
  .fab-item-btn{font-size:12px;padding:0 12px;height:38px}
  .card{padding:12px}
  .team-dropdown{max-height:160px}
  input,select,textarea{font-size:16px}  /* prevent iOS zoom */
}
@media(max-width:360px){
  .apps-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}

/* ── Utility classes — replaces repetitive inline styles ──────── */
.tx1{font-size:14px;font-weight:700;color:var(--text1)}
.tx2{font-size:13px;color:var(--text2)}
.tx3{font-size:12px;color:var(--text2)}
.tx4{font-size:11px;color:var(--text3)}
.txb{font-weight:700}
.flex-c{display:flex;align-items:center}
.flex-sb{display:flex;align-items:center;justify-content:space-between}
.gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
.mb4{margin-bottom:4px}.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}

<script>
// ══════════════════════════════════════════════════════
// CORE — shared state, auth, utils
// ══════════════════════════════════════════════════════
let currentUser = null;
let currentAppId = null;
let accessToken = null;
let azureClientId = '';
const WORKER_URL = 'https://jlc-sync.loyalkanikunj.workers.dev';
let proxyUrl = WORKER_URL;

// ══════════════════════════════════════════════════════════════════
// D1 DATABASE via Cloudflare Worker — Single source of truth
// All reads/writes go through the Worker → D1 (SQLite in Cloudflare)
// Unlimited reads/writes on free tier. No Firebase needed.
// ══════════════════════════════════════════════════════════════════

// In-memory store — D1 is source of truth, _mem is the local read cache
// ══════════════════════════════════════════════════════════════════
// DATA_TABLES — All D1 tables used by the app.
// To add a new table: (1) add entry here, (2) add to bootApp Promise.all,
//   (3) add 'ca_newtable' to Worker TABLES array in jlc-sync-worker.js,
//   (4) CREATE TABLE in Cloudflare D1 console.
// Format: { key: '_mem key', table: 'D1 table name', def: default value }
// ══════════════════════════════════════════════════════════════════
const DATA_TABLES = [
  { key:'ca_cases',       table:'ca_cases',       def:[] },
  { key:'ca_roc',         table:'ca_roc',          def:[] },
  { key:'ca_clients',     table:'ca_clients',      def:[] },
  { key:'ca_users',       table:'ca_users',        def:[] },
  { key:'ca_opts_doc',    table:'ca_opts_doc',     def:[] },
  { key:'ca_deleted_lit', table:'ca_deleted_lit',  def:[] },
  { key:'ca_deleted_roc', table:'ca_deleted_roc',  def:[] },
  { key:'ca_exec',        table:'ca_exec',         def:[] },
];

const _mem = { ca_cases:[], ca_roc:[], ca_clients:[], ca_users:[], ca_deleted_lit:[], ca_deleted_roc:[], ca_opts:null, ca_exec:[] };
let _dbOK  = false;
let _fbOK  = true;  // alias kept for compatibility
let _unsub = {};    // polling intervals
let _pollTs = {};   // last-seen timestamps per table for efficient polling
let xlsxEtag = null; // tracks OneDrive Excel file version

// ── Worker API call ────────────────────────────────────────────────
// ╔══ SECTION: DATABASE (D1) ══════════════════════════════════════╗
async function workerCall(body){
  if(!proxyUrl) throw new Error('Worker URL not configured');
  const r = await fetch(proxyUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await r.json();
  if(data.error) throw new Error(data.error);
  return data;
}

// ── D1 CRUD ────────────────────────────────────────────────────────
async function dbGet(col){
  try{
    const d = await workerCall({ action:'db_get', table:col });
    return d.rows||[];
  }catch(e){ console.error('dbGet',col,e); return []; }
}

async function dbSave(col, id, data){
  try{
    await workerCall({ action:'db_set', table:col, id:String(id), data });
  }catch(e){ console.error('dbSave',col,id,e); }
}

async function dbDelete(col, id){
  try{
    await workerCall({ action:'db_delete', table:col, id:String(id) });
  }catch(e){ console.error('dbDelete',col,id,e); }
}

async function dbSetDoc(col, id, data){
  await dbSave(col, id, data);
}

async function dbBatchSet(col, items){
  try{
    await workerCall({ action:'db_batch_set', table:col, items });
  }catch(e){ console.error('dbBatchSet',col,e); }
}

// ── Real-time polling — full fetch for reliability ────────────────
// Uses full db_get instead of db_get_since so deletions sync correctly.
// D1 is fast enough — 500 rows fetch in ~50ms.
function dbSubscribe(col, onUpdate){
  if(_unsub[col]) clearInterval(_unsub[col]);
  _unsub[col] = setInterval(async()=>{
    try{
      const d = await workerCall({ action:'db_get', table:col });
      if(!d.rows) return;
      // Check if anything changed (adds, edits, OR deletes)
      const newIds  = new Set(d.rows.map(r=>String(r.id||r.username||'')));
      const oldIds  = new Set((_mem[col]||[]).map(r=>String(r.id||r.username||'')));
      const changed = d.rows.length !== (_mem[col]||[]).length
                   || d.rows.some(r=>{ const old=(_mem[col]||[]).find(x=>String(x.id||x.username||'')===String(r.id||r.username||'')); return !old||JSON.stringify(old)!==JSON.stringify(r); })
                   || [...oldIds].some(id=>!newIds.has(id));
      if(changed){
        _mem[col] = d.rows;
        if(onUpdate) onUpdate(d.rows);
      }
    }catch(e){}
  }, 30000); // poll every 30s
}

// ── loadFirebase (renamed internally to loadDB) ────────────────────
function loadFirebase(cb){ _dbOK=true; _fbOK=true; cb(); }
// ── ls / lsSet — now read/write from _mem (not localStorage) ──────
// lsSet writes to BOTH _mem (instant) AND D1 (persisted)
function ls(k, fb){
  if(_mem[k] !== undefined && _mem[k] !== null) return _mem[k].length!==undefined ? _mem[k] : (_mem[k]||fb);
  return fb;
}
function lsSet(k, v){
  const prev = _mem[k];
  _mem[k] = v; // update in-memory immediately for instant UI
  if(!_dbOK) return;
  if(Array.isArray(v)){
    // Write updated/new items
    const items = v.filter(item => item.id||item.username);
    if(items.length) dbBatchSet(k, items);
    // Delete items that were removed (compare with previous _mem)
    if(Array.isArray(prev)){
      const newIds = new Set(items.map(x=>String(x.id||x.username)));
      prev.forEach(old=>{
        const oldId = String(old.id||old.username||'');
        if(oldId && !newIds.has(oldId)) dbDelete(k, oldId);
      });
    }
  }
}

// ── User helpers use _mem directly ────────────────────────────────
function getUsers(){ return _mem.ca_users||[]; }
function setUsers(u){
  _mem.ca_users = u;
  if(_dbOK) dbBatchSet('ca_users', u.filter(x=>x.username));
}

// ── Options stored as single Firestore document ────────────────────
function getOpts(){
  try{
    if(_mem.ca_opts) return {...DEFAULT_OPTS,..._mem.ca_opts};
  }catch(e){}
  return {...DEFAULT_OPTS};
}
function saveOpts(o){
  _mem.ca_opts = o;
  if(_dbOK) dbSave('ca_opts_doc','opts', o);
}
// accessToken kept as sentinel — 'proxy' means proxy mode active
function signIn(){ toast('Configure the Worker URL in Setup → OneDrive'); }
function tryAutoSignIn(){
  // Firebase is source of truth — OneDrive is for Excel backup only
  // Just enable the OneDrive connection for Excel sync if Worker is configured
  if(proxyUrl){
    accessToken = 'proxy';
    const btn=document.getElementById('authBtn');
    if(btn){ btn.textContent='✓ OneDrive'; btn.style.background='#1a6b3a'; }
    const lsb=document.getElementById('launchSyncBtn'); if(lsb) lsb.style.display='flex';
    const sb=document.getElementById('syncBtn'); if(sb) sb.style.display='flex';
    startPoll();
  }
}
function onSignedIn(){
  accessToken = 'proxy'; // sentinel value
  const btn=document.getElementById('authBtn');
  btn.textContent='✓ OneDrive'; btn.style.background='#1a6b3a';
  btn.textContent='✓ OneDrive'; btn.style.background='#1a6b3a';
  const lsb=document.getElementById('launchSyncBtn'); if(lsb) lsb.style.display='flex';
  setupOD(); startPoll();
  pullFromExcel(true);
  if(currentAppId==='setup') refreshOdBanner('proxy');
}

// ╔══ SECTION: ONEDRIVE / AZURE ════════════════════════════════════╗
async function gFetch(ep, opts={}){
  if(!proxyUrl) return null;
  try{
    const r = await fetch(proxyUrl, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({action:'fetch', ep, method:opts.method||'GET', body:opts.body||null, contentType:opts.headers?.['Content-Type']||'application/json'})
    });
    if(!r.ok) return null;
    return r.json().catch(()=>null);
  }catch(e){ return null; }
}
async function gPut(ep, bytes){
  if(!proxyUrl) return null;
  try{
    // Convert to base64 for safe binary transport through JSON
    let binary = '';
    const uint8 = new Uint8Array(bytes);
    for(let i=0; i<uint8.length; i++) binary += String.fromCharCode(uint8[i]);
    const base64 = btoa(binary);
    const r = await fetch(proxyUrl, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({action:'put', ep, base64})
    });
    return r.ok ? r.json().catch(()=>null) : null;
  }catch(e){ return null; }
}
async function gDown(ep){
  if(!proxyUrl) return null;
  try{
    const r = await fetch(proxyUrl, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({action:'download', ep})
    });
    if(!r.ok) return null;
    const json = await r.json();
    if(!json.base64) return null;
    // Decode base64 to ArrayBuffer
    const bin = atob(json.base64);
    const bytes = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    return bytes.buffer;
  }catch(e){ return null; }
}

function getExcelSheets(){

    {
      sheet: 'Litigation',
      getHeaders: ()=>['ID','Client Code','Client','Act','Type','FY','Description','Status','Deadline','Authority','Amount','Payment Due','Remarks','Team','Created','Updated'],
      getRows: ()=>{
        const cases=ls('ca_cases',[]), clients=ls('ca_clients',[]);

          const cl=clients.find(x=>x.id===c.clientId)||{};
          return [c.id, cl.code||'', c.client||'', c.act, c.type||'', getFYLabel(c), c.desc||'', c.status, c.deadline||'', c.authority||'', c.amount||'', c.paydue||'', c.remarks||'', (c.team||[]).join(', '), c.createdAt||'', c.updatedAt||''];
        });
      },
      applyRow: (row, existing, now)=>{
        const id=xlStr(row,'ID'); if(!id) return null;
        return {
          id,
          client:   xlStr(row,'Client'),
          act:      xlStr(row,'Act')||'GST',
          type:     xlStr(row,'Type'),
          desc:     xlStr(row,'Description'),
          status:   xlStr(row,'Status')||'Open',
          deadline: fmtISO(row['Deadline']),
          authority:xlStr(row,'Authority'),
          amount:   xlStr(row,'Amount'),
          paydue:   xlStr(row,'Payment Due'),
          remarks:  xlStr(row,'Remarks'),
          team:     xlTeam(row),
        };
      },
      storageKey: 'ca_cases',
    },
    {
      sheet: 'ROC - Others',
      getHeaders: ()=>['ID','Client Code','Client','FY','Form','Description','Status','Due Date','Date Filed','SRN','Fee','Remarks','Team','Created','Updated'],
      getRows: ()=>{
        const roc=ls('ca_roc',[]), clients=ls('ca_clients',[]);
        return roc.map(r=>{
          const cl=clients.find(x=>x.id===r.clientId)||{};
          return [r.id, cl.code||'', r.client||'', r.fy||'', r.form||'', r.desc||'', r.status, r.due||'', r.filed||'', r.srn||'', r.fee||'', r.remarks||'', (r.team||[]).join(', '), r.createdAt||'', r.updatedAt||''];
        });
      },
      applyRow: (row, existing, now)=>{
        const id=xlStr(row,'ID'); if(!id) return null;
        return {
          id,
          client:  xlStr(row,'Client'),
          fy:      xlStr(row,'FY'),
          form:    xlStr(row,'Form'),
          desc:    xlStr(row,'Description'),
          status:  xlStr(row,'Status')||'Pending',
          due:     fmtISO(row['Due Date']),
          filed:   fmtISO(row['Date Filed']),
          srn:     xlStr(row,'SRN'),
          fee:     xlStr(row,'Fee'),
          remarks: xlStr(row,'Remarks'),
          team:    xlTeam(row),
        };
      },
      storageKey: 'ca_roc',
    },
    {
      sheet: 'Clients',
      getHeaders: ()=>['ID','Code','Name','Type','GSTIN','PAN','Address','Contact','Phone','Email','GST Portal ID','GST Password','IT Portal ID','IT Password','Notes','Created'],
      getRows: ()=>{
        return ls('ca_clients',[]).map(c=>[c.id, c.code||'', c.name||'', c.clientType||'', c.gstin||'', c.pan||'', c.address||'', c.contact||'', c.phone||'', c.email||'', c.gst_id||'', c.gst_pass||'', c.it_id||'', c.it_pass||'', c.notes||'', c.createdAt||'']);
      },
      applyRow: (row, existing, now)=>{
        const id=xlStr(row,'ID');

        if(!name) return null;
        const resolvedId = id || (existing.find(c=>c.code&&c.code===code)?.id) || (existing.find(c=>c.name.toLowerCase()===name.toLowerCase())?.id) || null;
        return {
          id: resolvedId || 'CL'+Date.now()+Math.random().toString(36).slice(2,6),

          password: xlStr(row,'Password'),
          name:     xlStr(row,'Name')||username,
          role:     String(row['Role']||'staff').trim(),

          assignedTo: xlStr(row,'Assigned To'),
          linkedType: xlStr(row,'Linked Type')||null,
          linkedId:   xlStr(row,'Linked ID')||null,
        };
      },
      storageKey: 'ca_exec',
    },
  ];
}

// ── Smart Sync: Pull first → merge → Push ─────────────────────────
// Called by the ⟳ Sync button and auto-triggered on every save
let _syncQueued = false;
let _syncTimer  = null;

function smartSync(){
  // Manual sync: Pull → then Push
  if(!proxyUrl||!accessToken){ toast('⚠ OneDrive not connected'); return; }
  setSyncBtn('syncing');
  loadXLSX(async()=>{
    try{
      // Step 1: Pull latest from Excel first
      await _pullAndMerge();
      // Step 2: Push merged local data back
      await _pushToExcel();
    }catch(e){ setSyncBtn('error'); toast('Sync error: '+e.message); }
  });
}


async function _pullAndMerge(){
  const meta = await gFetch('/me/drive/root:/JLC-Sync/JLCSync_Master.xlsx');
  if(!meta||meta.error) return; // file doesn't exist yet — that's fine
  if(xlsxEtag && meta.eTag && meta.eTag===xlsxEtag) return; // no changes in Excel
  const bytes = await gDown('/me/drive/root:/JLC-Sync/JLCSync_Master.xlsx:/content');
  if(!bytes) return;
  const wb = XLSX.read(new Uint8Array(bytes),{type:'array',cellDates:true});
  const now = today();
  getExcelSheets().forEach(mod=>{
    const ws = wb.Sheets[mod.sheet]; if(!ws) return;
    let store = ls(mod.storageKey,[]);
    if(mod.customMerge){
      const parsed = XLSX.utils.sheet_to_json(ws,{defval:''}).map(row=>mod.applyRow(row,store,now)).filter(Boolean);
      if(parsed.length){ parsed.forEach(obj=>{ const idx=store.findIndex(x=>x.username===obj.username); if(idx>=0) store[idx]={...store[idx],...obj}; else store.push(obj); }); lsSet(mod.storageKey,store); }
    } else {
      XLSX.utils.sheet_to_json(ws,{defval:''}).forEach(row=>{
        const obj=mod.applyRow(row,store,now); if(!obj) return;
        const idx=store.findIndex(x=>x.id===obj.id);
        if(idx>=0) store[idx]={...store[idx],...obj}; else{ store.push({...obj,createdAt:now}); }
      });
      lsSet(mod.storageKey,store);
    }
  });
  xlsxEtag = meta.eTag||meta['@odata.etag']||null;
  // Re-render after pull
  if(currentAppId==='litigation') litRenderAll();
  if(currentAppId==='roc') rocRenderAll();
  const lvc=document.getElementById('lview-clients'); if(lvc&&lvc.style.display!=='none') renderLauncherClients();
}

async function _pushToExcel(){
  // Safety guard: never push if ALL main data stores are empty
  const cases   = ls('ca_cases',[]);
  const roc     = ls('ca_roc',[]);
  const clients = ls('ca_clients',[]);
  const users   = getUsers();
  if(!cases.length && !roc.length && !clients.length && users.length<=1){
    setSyncBtn('error'); toast('⚠ Sync blocked — local data appears empty. Pull first.');
    return;
  }
  setSyncBtn('syncing');
  const wb = XLSX.utils.book_new();
  getExcelSheets().forEach(mod=>{
    const headers = mod.getHeaders();
    const rows    = mod.getRows();
    const ws = XLSX.utils.aoa_to_sheet([headers,...rows]);
    ws['!cols'] = headers.map(h=>({wch:Math.max(h.length+4,14)}));
    ws['!freeze'] = {xSplit:0,ySplit:1};
    XLSX.utils.book_append_sheet(wb,ws,mod.sheet);
  });
  const bytes = XLSX.write(wb,{type:'array',bookType:'xlsx'});
  const res = await gPut('/me/drive/root:/JLC-Sync/JLCSync_Master.xlsx:/content',bytes);
  if(res&&!res.error){ xlsxEtag=res.eTag||res['@odata.etag']||null; setSyncBtn('synced'); }
  else{ setSyncBtn('error'); toast('Sync failed: '+(res?.error?.message||'Check Worker logs')); }
}

function syncToExcel(){ autoSync(); } // legacy alias

async function pullFromExcel(silent){
  if(!accessToken) return;
  if(!silent){ toast('Checking…'); setSyncBtn('syncing'); }
  loadXLSX(async()=>{
    try{
      await _pullAndMerge();
      setSyncBtn('synced');
      if(!silent) toast('Changes applied ✓');
      if(currentAppId==='litigation') litRenderAll();
      if(currentAppId==='roc') rocRenderAll();
      const lvc=document.getElementById('lview-clients'); if(lvc&&lvc.style.display!=='none') renderLauncherClients();
      const lvm=document.getElementById('lview-mine'); if(lvm&&lvm.style.display!=='none') renderLauncherMyTasks();
    }catch(e){ setSyncBtn('error'); if(!silent) toast('Pull error: '+e.message); }
  });
}

// ── Utils ────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(d){
  if(!d) return '';
  try{
    // Handle DD/MM/YYYY legacy format
    let dt;
    if(typeof d==='string' && /^\d{2}\/\d{2}\/\d{4}$/.test(d)){
      const [dd,mm,yyyy]=d.split('/'); dt=new Date(`${yyyy}-${mm}-${dd}`);
    } else { dt=new Date(d); }
    if(isNaN(dt.getTime())) return String(d);
    return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  }catch(e){ return String(d); }
}
function today(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),3000); }

// MULTI-ACTION FAB

let _fabPrimaryAction = null;
let _fabMenuOpen = false;
const _fabActions = []; // global registry — avoids inline serialisation bugs

function mkFab(onclick){
  // Called by each app to register a primary quick-add action
  _fabPrimaryAction = onclick;
  const mf = document.getElementById('_multiFab');
  if(mf) mf.style.display = 'flex';
}

function hideFab(){
  const mf = document.getElementById('_multiFab');
  if(mf) mf.style.display = 'none';
  closeFabMenu();
}

function toggleFabMenu(){
  if(_fabMenuOpen) closeFabMenu();
  else openFabMenu();
}

function openFabMenu(){
  _fabMenuOpen = true;
  buildFabMenu();
  const menu    = document.getElementById('_fabMenu');
  const fab     = document.getElementById('_multiFab');
  const overlay = document.getElementById('_fabOverlay');
  if(menu)    menu.style.display    = 'flex';
  if(fab){    fab.innerHTML = '&#10005;'; fab.style.background = '#c0392b'; }
  if(overlay) overlay.style.display = 'block';
}

function closeFabMenu(){
  _fabMenuOpen = false;
  const menu    = document.getElementById('_fabMenu');
  const fab     = document.getElementById('_multiFab');
  const overlay = document.getElementById('_fabOverlay');
  if(menu)    menu.style.display    = 'none';
  if(fab){    fab.innerHTML = '+'; fab.style.background = ''; }
  if(overlay) overlay.style.display = 'none';
}

function buildFabMenu(){
  const menu = document.getElementById('_fabMenu'); if(!menu) return;
  _fabActions.length = 0; // reset registry

  // Build context-aware action list
  const actions = [];

  if(currentAppId === 'litigation'){
    actions.push({ icon:'⚖', label:'Add Case',        fn:()=>litOpenModal(null) });
    actions.push({ icon:'⚡', label:'Add Executable',  fn:()=>openExecModal(null) });
  } else if(currentAppId === 'roc'){
    actions.push({ icon:'📋', label:'Add ROC Filing',  fn:()=>rocOpenModal(null) });
    actions.push({ icon:'⚡', label:'Add Executable',  fn:()=>openExecModal(null) });
  } else {
    // Launcher / home screen
    actions.push({ icon:'⚡', label:'Add Executable',  fn:()=>openExecModal(null) });
    actions.push({ icon:'⚖', label:'Add Litigation Case', fn:()=>{ openApp('litigation'); setTimeout(()=>litOpenModal(null),250); } });
    actions.push({ icon:'📋', label:'Add ROC Filing',  fn:()=>{ openApp('roc'); setTimeout(()=>rocOpenModal(null),250); } });
    actions.push({ icon:'👥', label:'Add Client',      fn:()=>launchOpenClientModal() });
  }

  // Store in registry
  actions.forEach(a => _fabActions.push(a.fn));

  // Render — buttons call fabAction(idx) which looks up registry
  menu.innerHTML = actions.map((a, i) => `
    <div class="fab-item" style="animation-delay:${i*0.05}s">
      <button class="fab-item-btn" onclick="fabAction(${i})">
        <span style="margin-right:6px">${a.icon}</span>${a.label}
      </button>
    </div>
  `).join('');
}

function fabAction(idx){
  closeFabMenu();
  const fn = _fabActions[idx];
  if(typeof fn === 'function') fn();
}

/**
 * Build a form row: <div class="fr"><label>…</label>CONTENT</div>
 * @param {string} label
 * @param {string} content  — inner HTML (input, select, textarea, etc.)
 * @param {string} [hint]   — optional small helper text below
 */
function mkFR(label, content, hint=''){
  return `<div class="fr">
    <label>${label}</label>
    ${content}
    ${hint?`<div class="tx4 mt4">${hint}</div>`:''}
  </div>`;
}

/**
 * Build a two-column form row
 */
function mkFR2(left, right){
  return `<div class="fr2">${left}${right}</div>`;
}

/**
 * Build a standard modal shell
 * @param {string} title
 * @param {string} id        — modal id
 * @param {string} body      — inner HTML
 * @param {string} [footer]  — action buttons HTML (default: Save + Cancel)
 * @param {string} [closeFn] — close function name
 */
function mkModalShell(title, id, body, footer='', closeFn=''){
  const close = closeFn || `closeMdl('${id}')`;
  const actions = footer || `
    <button class="btn btn-primary" onclick="${id.replace('Modal','')}Save()" style="flex:1">Save</button>
    <button class="btn btn-outline" onclick="${close}" style="flex:1">Cancel</button>`;
  return `
    <div class="modal-hdr">
      <span>${esc(title)}</span>
      <button class="modal-close" onclick="${close}">✕</button>
    </div>
    ${body}
    <div class="modal-actions">${actions}</div>`;
}

/**

/**
 * Build a colour badge
 * @param {string} text
 * @param {'primary'|'success'|'warn'|'danger'|'neutral'} color

function mkBadge(text, color='neutral'){
  const map={
    primary: 'background:var(--primary-light);color:var(--primary)',
    success: 'background:#e8f5e9;color:#2e7d32',
    warn:    'background:#fff8e1;color:#f57f17',
    danger:  'background:#fdecea;color:#c0392b',
    neutral: 'background:var(--bg);color:var(--text2);border:1px solid var(--border)',
  };
  return `<span class="chip" style="${map[color]||map.neutral}">${esc(String(text))}</span>`;
}

/**
 * Map a task status string to a badge color
 */
function statusColor(status){
  const s=(status||'').toLowerCase();
  if(s.includes('open')||s.includes('pending')) return 'warn';
  if(s.includes('close')||s.includes('filed')||s.includes('done')||s.includes('complete')) return 'success';
  if(s.includes('overdue')) return 'danger';
  return 'neutral';
}

  return `<select id="${id}" ${extraAttrs}>

}

function addOpt(key){ const el=document.getElementById('onew-'+key); const v=el.value.trim(); if(!v){toast('Enter a value');return;} const O=getOpts(); if(O[key].includes(v)){toast('Already exists');return;} O[key].push(v); saveOpts(O); el.value=''; refreshOB(key); toast('Added ✓'); }

function moveOpt(key,idx,dir){ const O=getOpts(),a=O[key],ni=idx+dir; if(ni<0||ni>=a.length)return; [a[idx],a[ni]]=[a[ni],a[idx]]; saveOpts(O); refreshOB(key); }

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
  const s=document.getElementById(id);
  if(s) s.style.display = id==='s-login' ? 'flex' : 'block';
}

function showErr(el, msg){ if(el){el.textContent=msg; el.style.display='block';} toast(msg); }

function doLogin(){
  const u=document.getElementById('lu').value.trim().toLowerCase();
  const p=document.getElementById('lp').value;
  const err=document.getElementById('loginErr');
  if(!u||!p){ showErr(err,'Enter username and password'); return; }

  const btn=document.querySelector('#s-login .btn-primary');

  // If Firebase not ready yet, wait for it
  if(!_fbOK){
    if(btn){ btn.textContent='Connecting…'; btn.disabled=true; }
    const hint=document.getElementById('loginSyncStatus');
    if(hint) hint.textContent='⏳ Waiting for database…';
    // Poll until Firebase is ready (max 10 seconds)
    let tries=0;
    const wait=setInterval(()=>{
      tries++;
      if(_fbOK){
        clearInterval(wait);
        if(btn){ btn.textContent='Sign In'; btn.disabled=false; }
        doLoginAttempt(u,p,err);
      } else if(tries>24){
        clearInterval(wait);
        if(btn){ btn.textContent='Sign In'; btn.disabled=false; btn.style.opacity='1'; }
        if(hint) hint.textContent='⚠ Database slow — trying local login';
        // Try login anyway with whatever users we have (initUsers ensures default admin)
        initUsers();
        doLoginAttempt(u,p,err);
      }
    },500);
    return;
  }

  doLoginAttempt(u,p,err);
}

function doLoginAttempt(u,p,err){
  const m=getUsers().find(x=>x.username.toLowerCase()===u && x.password===p);
  if(!m){ showErr(err,'Incorrect username or password'); return; }
  err.style.display='none';
  currentUser={username:m.username, name:m.name, role:m.role};
  // session held in memory only
  showLauncher();
}

function doLogout(){
  const mf=document.getElementById('_multiFab'); if(mf) mf.style.display='none';
  currentUser=null;
  // session cleared
  // Unsubscribe all Firestore listeners
  Object.values(_unsub).forEach(fn=>{ try{ fn(); }catch(e){} });
  showScreen('s-login');
}

function openProfileModal(){
  if(!currentUser) return;
  document.getElementById('profileName').textContent = currentUser.name||currentUser.username;
  document.getElementById('profileMeta').textContent = '@'+currentUser.username+' · '+currentUser.role;
  document.getElementById('prof_name').value = currentUser.name||'';
  document.getElementById('prof_cur').value='';
  document.getElementById('prof_new').value='';
  document.getElementById('profileErr').style.display='none';
  openMdl('profileModal');
}

function saveProfile(){
  const newName=document.getElementById('prof_name').value.trim();
  const curPass=document.getElementById('prof_cur').value;
  const newPass=document.getElementById('prof_new').value;
  const err=document.getElementById('profileErr');
  const users=getUsers();
  const idx=users.findIndex(u=>u.username===currentUser.username);
  if(idx<0){ showErr(err,'User not found'); return; }
  if(curPass){
    if(users[idx].password!==curPass){ showErr(err,'Current password incorrect'); return; }
    if(!newPass||newPass.length<6){ showErr(err,'New password must be at least 6 characters'); return; }
    users[idx].password=newPass;
  }
  if(newName) users[idx].name=newName;
  setUsers(users);
  currentUser={...currentUser, name:users[idx].name};
  // session held in memory only
  const lu=document.getElementById('launchUser'); if(lu) lu.textContent=currentUser.name+(currentUser.role==='admin'?' (Admin)':'');
  closeMdl('profileModal');
  toast('Profile updated ✓');
}

function dlBadge(dateStr, warnDays=7){
  if(!dateStr) return '';
  const d=new Date(dateStr), now=new Date();
  now.setHours(0,0,0,0); d.setHours(0,0,0,0);
  const diff=Math.round((d-now)/(1000*60*60*24));
  if(diff<0) return `<span style="background:#fee2e2;color:#c0392b;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700">Overdue ${Math.abs(diff)}d</span>`;
  if(diff===0) return `<span style="background:#fee2e2;color:#c0392b;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700">Due Today</span>`;
  if(diff<=warnDays) return `<span style="background:#fef3cd;color:#856404;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700">Due in ${diff}d</span>`;
  return `<span style="background:var(--bg);color:var(--text2);padding:2px 8px;border-radius:8px;font-size:11px;border:1px solid var(--border)">${fmtDate(dateStr)}</span>`;
}

/**
 * appShowPage — shared tab switcher used by all module Show Page functions
 * @param {string} name      — tab name to activate
 * @param {string} tabBarId  — id of the tab bar element

 * @param {string} pagePrefix— id prefix for page divs (e.g. 'lp-' or 'rp-')
 * @param {object} [onRender]— optional map of {tabName: renderFn} to call on activate
 */
function appShowPage(name, tabBarId, tabs, pagePrefix, onRender={}){
  document.querySelectorAll('#appMount .page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll(`#${tabBarId} .tab`).forEach((t,i)=>t.classList.toggle('active', tabs[i]===name));
  const pg = document.getElementById(pagePrefix+name);
  if(pg) pg.classList.add('active');
  if(onRender[name]) onRender[name]();
}

function getFYLabel(c){
  if(c.fyType==='inspection') return c.inspDate?'Date: '+fmtDate(c.inspDate):'';
  if(c.fyType==='audit') return(c.fyFrom&&c.fyTo)?`FY ${c.fyFrom}–${c.fyTo}`:'';

}
function getFYKeys(c){
  if(c.fyType==='inspection') return c.inspDate?[c.inspDate.slice(0,4)]:[];
  if(c.fyType==='audit'){ const a=[];if(c.fyFrom&&c.fyTo){const s=parseInt(c.fyFrom),e=parseInt(c.fyTo);for(let y=s;y<=e;y++)a.push(`${y}-${String(y+1).slice(2)}`);}return a; }
  return c.fy?[c.fy]:[];
}

function litSave(){
  const client=document.getElementById('fc_client').value.trim();
  if(!client){toast('Client is required');return;}
  const now=today(), status=document.getElementById('fc_status').value;
  let clientId=document.getElementById('fc_client').dataset.clientId||null;
  // Auto-resolve clientId by name if not set (e.g. user typed instead of picking)
  if(!clientId){
    const match=ls('ca_clients',[]).find(c=>c.name.toLowerCase()===client.toLowerCase());
    if(match){ clientId=match.id; document.getElementById('fc_client').dataset.clientId=match.id; }
    else{ toast('Please select a client from the dropdown list'); return; }
  }
  const obj={client,clientId,act:document.getElementById('fc_act').value,type:document.getElementById('fc_type').value,...litGetFYVal(),desc:document.getElementById('fc_desc').value.trim(),status,deadline:status==='Replied'?'':document.getElementById('fc_dl').value,authority:document.getElementById('fc_auth').value.trim(),amount:document.getElementById('fc_amt').value,paydue:status==='Order Received'?document.getElementById('fc_pay').value:'',remarks:document.getElementById('fc_rem').value.trim(),team:getSelectedTeam('fc_team_wrap')};
  let cases=ls('ca_cases',[]);
  if(litEditId){
    const i=cases.findIndex(x=>x.id===litEditId);
    const oldCase = cases[i];
    const oldFolder = caseFolderName(oldCase);
    const newFolder = caseFolderName({...oldCase,...obj});
    cases[i]={...oldCase,...obj,updatedAt:now};
    // Rename OneDrive folder if folder-affecting fields changed
    if(accessToken && oldFolder && newFolder && oldFolder!==newFolder && oldCase.act){
      const act = obj.act||oldCase.act;
      const oldPath=`/me/drive/root:/JLC-Sync/Litigation/${act}/${oldFolder}`;
      gFetch(oldPath).then(f=>{
        if(f?.id){
          gFetch(`/me/drive/items/${f.id}`,{method:'PATCH',body:JSON.stringify({name:newFolder})})
            .then(()=>toast('Case updated + folder renamed ✓'))
            .catch(()=>toast('Case updated ✓ (folder rename failed)'));
        }
      }).catch(()=>{});
    } else { toast('Case updated ✓'); }
  } else {
    cases.unshift({id:'C'+Date.now(),...obj,createdAt:now,updatedAt:now});
    toast('Case added ✓');
  }
  lsSet('ca_cases',cases); closeMdl('caseModal'); litRenderAll(); autoSync();
}

// Case OneDrive docs
function caseFolderName(c){
  const clean = s=>String(s||'').replace(/[\/\\:*?"<>|]/g,'').replace(/\s+/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'');
  const client = clean(c.client||c.id).slice(0,30);
  const type   = clean(c.type||c.act||'');
  const fy     = c.fyType==='inspection'&&c.inspDate ? clean(c.inspDate)
               : c.fyType==='audit'&&c.fyFrom        ? `${clean(c.fyFrom)}_to_${clean(c.fyTo)}`
               : c.fy                                ? `FY${clean(c.fy)}`
               : '';
  const desc   = clean(c.desc||'').slice(0,25);
  // Short unique suffix prevents collision when two tasks have identical fields
  const uid    = c.id ? '_'+String(c.id).slice(-6) : '';
  return ([client,type,fy,desc].filter(Boolean).join('_').slice(0,73)+uid).slice(0,80);
}

// Folder path: JLC-Sync/ROC - Others/[Client]/[FY]/[Form_ID]/
function rocClientFolderName(r){
  const clients = ls('ca_clients',[]);
  const cl = clients.find(x=>x.id===r.clientId);
  const clientStr = ((cl?.code ? cl.code+'_' : '') + (r.client||r.id))
    .replace(/[\/\\:*?"<>|]/g,'_').replace(/\s+/g,'_').replace(/_+/g,'_');
  return clientStr;
}
function rocFyFolderName(r){
  // FY subfolder inside client — "FY2024-25" or "No_FY"
  return r.fy ? 'FY'+r.fy.replace(/[\/\\:*?"<>|]/g,'_') : 'No_FY';
}
function rocTaskFolderName(r){
  const form = (r.form||'Filing').replace(/[\/\\:*?"<>|]/g,'_').replace(/\s+/g,'_');
  // Unique suffix prevents collision when same form added twice in same FY
  const uid  = r.id ? '_'+String(r.id).slice(-6) : '';
  return form+uid;
}

async function ensureRocFolders(clientFolder, fyFolder, taskFolder){
  // 1. Ensure client folder
  await gFetch('/me/drive/root:/JLC-Sync/ROC - Others:/children',{
    method:'POST',
    body:JSON.stringify({name:clientFolder,folder:{},'@microsoft.graph.conflictBehavior':'fail'})
  });
  // 2. Ensure FY subfolder inside client
  await gFetch(`/me/drive/root:/JLC-Sync/ROC - Others/${clientFolder}:/children`,{
    method:'POST',
    body:JSON.stringify({name:fyFolder,folder:{},'@microsoft.graph.conflictBehavior':'fail'})
  });
  // 3. Ensure task folder inside FY folder
  const res = await gFetch(`/me/drive/root:/JLC-Sync/ROC - Others/${clientFolder}/${fyFolder}:/children`,{
    method:'POST',
    body:JSON.stringify({name:taskFolder,folder:{},'@microsoft.graph.conflictBehavior':'fail'})
  });
  return res;
}

function rocCreateFolder(){
  const roc = ls('ca_roc',[]); const r = roc.find(x=>x.id===rocEditId);
  if(!r||!accessToken){ toast(accessToken?'Save the filing first':'Sign in to OneDrive first'); return; }
  const clientFolder = rocClientFolderName(r);
  const fyFolder     = rocFyFolderName(r);
  const taskFolder   = rocTaskFolderName(r);
  toast('Creating folders…');
  ensureRocFolders(clientFolder, fyFolder, taskFolder).then(()=>{
    gFetch(`/me/drive/root:/JLC-Sync/ROC - Others/${clientFolder}/${fyFolder}/${taskFolder}`)
      .then(f=>{
        if(f?.webUrl){ window.open(f.webUrl); toast('Folder ready ✓'); }
        else toast('Folder created ✓');
      });
  }).catch(e=>toast('Folder error: '+e.message));
}

        </div>
        <button class="doc-link doc-folder" onclick="rocEditId='${r.id}';rocCreateFolder()" style="flex-shrink:0;white-space:nowrap">📁 Open Folder</button>

function rocSave(){
  const client=document.getElementById('fr_client').value.trim(); if(!client){toast('Client is required');return;}
  const now=today();
  let clientId=document.getElementById('fr_client').dataset.clientId||null;
  // Auto-resolve clientId by name if not set
  if(!clientId){
    const match=ls('ca_clients',[]).find(c=>c.name.toLowerCase()===client.toLowerCase());
    if(match){ clientId=match.id; document.getElementById('fr_client').dataset.clientId=match.id; }
    else{ toast('Please select a client from the dropdown list'); return; }
  }
  const obj={client,clientId,fy:document.getElementById('fr_fy').value,form:document.getElementById('fr_form').value,desc:document.getElementById('fr_desc').value.trim(),status:document.getElementById('fr_status').value,due:document.getElementById('fr_due').value,filed:document.getElementById('fr_filed').value,srn:document.getElementById('fr_srn').value.trim(),fee:document.getElementById('fr_fee').value,remarks:document.getElementById('fr_rem').value.trim(),team:getSelectedTeam('fr_team_wrap')};
  let roc=ls('ca_roc',[]);
  if(rocEditId){
    const i=roc.findIndex(x=>x.id===rocEditId);
    const oldRoc = roc[i];
    const oldClientFolder = rocClientFolderName(oldRoc);
    const oldFyFolder     = rocFyFolderName(oldRoc);
    const oldTaskFolder   = rocTaskFolderName(oldRoc);
    const newFyFolder     = rocFyFolderName({...oldRoc,...obj});
    const newTaskFolder   = rocTaskFolderName({...oldRoc,...obj});
    roc[i]={...oldRoc,...obj,updatedAt:now};
    // Rename/move OneDrive task folder if form or FY changed
    if(accessToken && oldTaskFolder){
      const oldPath=`/me/drive/root:/JLC-Sync/ROC - Others/${oldClientFolder}/${oldFyFolder}/${oldTaskFolder}`;
      if(oldFyFolder !== newFyFolder){
        // FY changed — ensure new FY folder exists then move task folder into it
        gFetch(`/me/drive/root:/JLC-Sync/ROC - Others/${oldClientFolder}:/children`,{
          method:'POST',body:JSON.stringify({name:newFyFolder,folder:{},'@microsoft.graph.conflictBehavior':'fail'})
        }).then(()=>gFetch(oldPath)).then(f=>{
          if(f?.id){
            gFetch(`/me/drive/items/${f.id}`,{method:'PATCH',body:JSON.stringify({
              name:newTaskFolder,
              parentReference:{path:`/drive/root:/JLC-Sync/ROC - Others/${oldClientFolder}/${newFyFolder}`}
            })}).then(()=>toast('Filing updated + moved to new FY folder ✓'))
               .catch(()=>toast('Filing updated ✓ (folder move failed)'));
          }
        }).catch(()=>{});
      } else if(oldTaskFolder !== newTaskFolder){
        // Only form name changed — rename in place
        gFetch(oldPath).then(f=>{
          if(f?.id){
            gFetch(`/me/drive/items/${f.id}`,{method:'PATCH',body:JSON.stringify({name:newTaskFolder})})
              .then(()=>toast('Filing updated + folder renamed ✓'))
              .catch(()=>toast('Filing updated ✓ (folder rename failed)'));
          }
        }).catch(()=>{});
      } else { toast('Filing updated ✓'); }
    } else { toast('Filing updated ✓'); }
  } else {
    roc.unshift({id:'R'+Date.now(),...obj,createdAt:now,updatedAt:now});
    toast('Filing added ✓');
  }
  lsSet('ca_roc',roc); closeMdl('rocModal'); rocRenderAll(); autoSync();
}

function rocRenderDue(){
  const roc=ls('ca_roc',[]); const el=document.getElementById('rocDueList'); if(!el)return;
  const now=new Date();now.setHours(0,0,0,0);

function setupSaveUser(){
  const username = document.getElementById('nu_u').value.trim().toLowerCase();
  const password = document.getElementById('nu_p').value;
  const name     = document.getElementById('nu_n').value.trim();
  const role     = document.getElementById('nu_r').value;
  if(!username){ toast('Username is required'); return; }
  if(!name){ toast('Display Name is required'); return; }

  const users = getUsers();

  if(_editingUserIdx >= 0){
    // ── Editing existing user ──────────────────────────────────
    const oldUsername = users[_editingUserIdx].username;
    // Check username conflict (only if username changed)
    if(username !== oldUsername){
      const conflict = users.find((u,i)=>u.username===username && i!==_editingUserIdx);
      if(conflict){ toast('Username "'+username+'" is already taken'); return; }
    }
    if(password && password.length<6){ toast('Password must be at least 6 characters'); return; }
    users[_editingUserIdx] = { ...users[_editingUserIdx], username, name, role };
    if(password) users[_editingUserIdx].password = password;
    // If editing current user's own account, update session
    if(currentUser?.username === oldUsername){
      currentUser = { ...currentUser, username, name, role };
      // session held in memory only
    }
    toast('User updated ✓');
  } else {
    // ── Adding new user ────────────────────────────────────────
    if(users.find(u=>u.username===username)){ toast('Username "'+username+'" already exists'); return; }
    if(!password){ toast('Password is required for new users'); return; }
    if(password.length<6){ toast('Password must be at least 6 characters'); return; }
    users.push({username, password, name, role});
    toast('User "'+username+'" added ✓');
  }

  setUsers(users);
  setupCancelEditUser();
  setupRenderUsers();
}
function setupDelUser(idx){ const users=getUsers(); if(users[idx].username===currentUser?.username){toast('Cannot delete your own account');return;} showConfirm(`Delete user "${users[idx].username}"?`,()=>{users.splice(idx,1);setUsers(users);setupRenderUsers();toast('Deleted');}); }

function importJSON(e){ const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.cases)lsSet('ca_cases',d.cases);if(d.roc)lsSet('ca_roc',d.roc);if(d.clients)lsSet('ca_clients',d.clients);if(d.users&&d.users.length)setUsers(d.users);if(d.opts)saveOpts(d.opts);toast('Imported to cloud ✓ — refreshing…');setTimeout(()=>location.reload(),1500);}catch{toast('Invalid JSON');}};r.readAsText(f); }

// ╔══ SECTION: TEAM MANAGEMENT ═════════════════════════════════════╗
function buildTeamWrap(wrapId, selectedUsernames){
  const wrap = document.getElementById(wrapId); if(!wrap) return;
  // Only reset _selected if explicitly provided
  if(selectedUsernames !== undefined) wrap._selected = (selectedUsernames||[]).slice();
  if(!wrap._selected) wrap._selected = [];

  function render(){
    const users = getUsers(); // always read fresh
    const sel   = wrap._selected||[];
    const chosen = users.filter(u=>sel.includes(u.username));
    wrap.innerHTML = `
      <div class="team-display" onclick="teamToggleDropdown('${wrapId}')">
        ${chosen.length
          ? chosen.map(u=>`<span class="team-pill-sm"><span class="team-avatar">${(u.name||u.username).slice(0,2).toUpperCase()}</span>${esc(u.name||u.username)}</span>`).join('')
          : `<span style="font-size:13px;color:var(--text3)">No one assigned</span>`}
        <span style="margin-left:auto;font-size:12px;color:var(--text3)">▾</span>
      </div>
      <div class="team-dropdown" id="${wrapId}_drop" style="display:none">
        ${users.length
          ? users.map(u=>{
              const checked=sel.includes(u.username);
              const isMe=u.username===currentUser?.username;
              return `<div class="team-option${checked?' selected':''}" onclick="teamToggleUser('${wrapId}','${u.username}',this)">
                <span class="team-avatar">${(u.name||u.username).slice(0,2).toUpperCase()}</span>
                <span style="flex:1;font-size:13px">${esc(u.name||u.username)}${isMe?' <span class="tx4">(you)</span>':''}</span>
                <span class="team-check">${checked?'✓':''}</span>
              </div>`;
            }).join('')
          : `<div style="padding:10px;font-size:13px;color:var(--text3)">No users — add in Setup → Users</div>`}
      </div>`;
    wrap._render = render;
  }

  render();

  // If no users yet (D1 still loading), retry every second up to 5 times
  if(!getUsers().length){
    let retries=0;
    const retry=setInterval(()=>{ retries++;
      if(getUsers().length||retries>5){ clearInterval(retry); render(); }
    },1000);
  }

  // Close on outside click (attach once)
  if(!wrap._listener){
    wrap._listener=true;
    document.addEventListener('click',e=>{
      if(!wrap.contains(e.target)){
        const drop=document.getElementById(wrapId+'_drop');
        if(drop) drop.style.display='none';
      }
    });
  }
}

function teamToggleDropdown(wrapId){
  const drop = document.getElementById(wrapId+'_drop');
  if(drop) drop.style.display = drop.style.display==='none'?'block':'none';
}

function teamToggleUser(wrapId, username, optEl){
  const wrap = document.getElementById(wrapId); if(!wrap) return;
  if(!wrap._selected) wrap._selected=[];
  const idx = wrap._selected.indexOf(username);
  if(idx>=0) wrap._selected.splice(idx,1);
  else wrap._selected.push(username);

  // Update this option in-place (no full re-render = no lost state)
  const isNowSelected = wrap._selected.includes(username);
  optEl.classList.toggle('selected', isNowSelected);
  const check = optEl.querySelector('.team-check');
  if(check) check.textContent = isNowSelected ? '✓' : '';

  // Update the display row to reflect current selection
  const users = getUsers();
  const chosen = users.filter(u=>wrap._selected.includes(u.username));
  const display = wrap.querySelector('.team-display');
  if(display){
    const pills = chosen.length
      ? chosen.map(u=>`<span class="team-pill-sm"><span class="team-avatar">${(u.name||u.username).slice(0,2).toUpperCase()}</span>${esc(u.name||u.username)}</span>`).join('')
      : `<span style="font-size:13px;color:var(--text3)">No one assigned</span>`;
    // Preserve the ▾ arrow
    display.innerHTML = pills + `<span style="margin-left:auto;font-size:12px;color:var(--text3)">▾</span>`;
  }
  // Keep dropdown open
  const drop=document.getElementById(wrapId+'_drop');
  if(drop) drop.style.display='block';
  // Re-check dirty state after team change
  if(wrapId==='fc_team_wrap') setTimeout(litCheckDirty,0);
  if(wrapId==='fr_team_wrap') setTimeout(rocCheckDirty,0);
}

function clientSug(inputId, boxId){
  const q=(document.getElementById(inputId)?.value||'').toLowerCase();
  const box=document.getElementById(boxId); if(!box) return;
  const clients=ls('ca_clients',[]);
  const matches=clients.filter(c=>
    !q||c.name.toLowerCase().includes(q)||(c.code||'').toLowerCase().includes(q)||
    (c.gstin||'').toLowerCase().includes(q)||(c.pan||'').toLowerCase().includes(q)
  ).slice(0,10);
  if(!matches.length && !q){ box.style.display='none'; return; }
  box.innerHTML=matches.length
    ? matches.map(c=>`<div class="csug-item" onmousedown="pickClientSug('${inputId}','${boxId}','${c.id}')">
        ${c.code?`<span class="csug-code">${esc(c.code)}</span>`:''}
        <span style="font-size:13px;font-weight:600">${esc(c.name)}</span>
        ${c.gstin||c.pan?`<div style="font-size:11px;color:var(--text3);margin-top:1px">${[c.gstin?'GSTIN: '+c.gstin:'',c.pan?'PAN: '+c.pan:''].filter(Boolean).join(' · ')}</div>`:''}
      </div>`).join('')
    : `<div class="csug-item" style="color:var(--text2);font-size:13px">No clients found</div>`;
  box.style.display='block';
}
function hideCsug(boxId){ const b=document.getElementById(boxId); if(b) b.style.display='none'; }
function pickClientSug(inputId, boxId, clientId){
  const c=ls('ca_clients',[]).find(x=>x.id===clientId); if(!c) return;
  const inp=document.getElementById(inputId); if(!inp) return;
  inp.value=c.name;
  inp.dataset.clientId=clientId;
  inp.dataset.clientCode=c.code||'';
  hideCsug(boxId);
  // Trigger dirty check so Save button enables
  inp.dispatchEvent(new Event('input', {bubbles:true}));
  inp.dispatchEvent(new Event('change', {bubbles:true}));
}

function exportClientsExcel(){
  loadXLSX(()=>{
    const clients=ls('ca_clients',[]);
    const headers=['Code','Name','Type','GSTIN','PAN','Address','Contact','Phone','Email','GST Portal ID','GST Password','IT Portal ID','IT Password','Notes'];
    const rows=clients.map(c=>[c.code||'',c.name||'',c.clientType||'',c.gstin||'',c.pan||'',c.address||'',c.contact||'',c.phone||'',c.email||'',c.gst_id||'',c.gst_pass||'',c.it_id||'',c.it_pass||'',c.notes||'']);
    const wb=XLSX.utils.book_new(); const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
    ws['!cols']=headers.map(h=>({wch:Math.max(h.length+4,14)}));
    XLSX.utils.book_append_sheet(wb,ws,'Clients'); XLSX.writeFile(wb,'JLC_Clients.xlsx'); toast('Clients exported ✓');
  });
}
function importClientsExcel(e){
  const file=e.target.files[0]; if(!file) return;
  loadXLSX(()=>{
    const reader=new FileReader();
    reader.onload=ev=>{ try{
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      let clients=ls('ca_clients',[]); let added=0,updated=0;
      rows.forEach(row=>{ const code=xlStr(row,'Code').toUpperCase(); const name=xlStr(row,'Name'); if(!name) return;
        const obj={code,name,clientType:xlStr(row,'Type'),gstin:xlStr(row,'GSTIN').toUpperCase(),pan:xlStr(row,'PAN').toUpperCase(),address:xlStr(row,'Address'),contact:xlStr(row,'Contact'),phone:xlStr(row,'Phone'),email:xlStr(row,'Email'),gst_id:xlStr(row,'GST Portal ID'),gst_pass:String(row['GST Password']||''),it_id:xlStr(row,'IT Portal ID'),it_pass:String(row['IT Password']||''),notes:xlStr(row,'Notes')};
        const idx=code?clients.findIndex(c=>c.code===code):clients.findIndex(c=>c.name.toLowerCase()===name.toLowerCase());
        if(idx>=0){clients[idx]={...clients[idx],...obj};updated++;}
          else{
            const uid='CL'+(Date.now()+added).toString(36)+Math.random().toString(36).slice(2,6);
            clients.push({id:uid,createdAt:today(),...obj});
            added++;
          }
      });
      lsSet('ca_clients', clients);
      renderLauncherClients();
      toast(`Saving ${added} new + ${updated} updated clients…`);
      // Use batch API for reliable bulk write to D1
      dbBatchSet('ca_clients', clients).then(()=>{
        toast(`Import complete: ${added} added, ${updated} updated ✓`);
        autoSync();
      });
      e.target.value='';
    }catch(err){toast('Import failed: '+err.message);e.target.value='';}};
    reader.readAsArrayBuffer(file);
  });
}

  const tf   =document.getElementById('launchClientTypeFilter')?.value||'';

  const roc    =ls('ca_roc',[]);
  // Populate type filter
  const typeFilter=document.getElementById('launchClientTypeFilter');
  if(typeFilter){ const types=getOpts().clientType||[]; const cur=typeFilter.value;
    typeFilter.innerHTML='<option value="">All Types</option>'+types.map(t=>`<option value="${t}"${cur===t?' selected':''}>${t}</option>`).join(''); }
  let list=clients.filter(c=>
    (!q||(c.name||'').toLowerCase().includes(q)||(c.code||'').toLowerCase().includes(q))&&
    (!tf||c.clientType===tf)
  );
  list.sort((a,b)=>{

          </div>

        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
          ${cCount?`<span style="font-size:11px;background:var(--primary-light);color:var(--primary);padding:2px 8px;border-radius:10px;font-weight:600">⚖️ ${cCount}</span>`:''}

function renderDeletedTasks(){
  const el = document.getElementById('deletedTasksList'); if(!el) return;
  if(!currentUser){ try{ currentUser=JSON.parse(localStorage.getItem('ca_session')); }catch(e){} }
  const isAdmin = currentUser?.role === 'admin';
  const delLit = ls('ca_deleted_lit',[]);
  const delRoc = ls('ca_deleted_roc',[]);
  const all = [
    ...delLit.map(c=>({...c, _mod:'Litigation',  _label:`${c.client||''} — ${c.act||''} ${c.desc||c.type||''}`.trim()})),
    ...delRoc.map(r=>({...r, _mod:'ROC - Others', _label:`${r.client||''} — ${r.form||''} ${r.fy?'FY '+r.fy:''}`.trim()})),
  ].sort((a,b)=>(b.deletedAt||'').localeCompare(a.deletedAt||''));

  if(!all.length){ el.innerHTML = emptyState('🗑️','No deleted tasks','Deleted tasks appear here'); return; }

  const adminNote = isAdmin
    ? 'You can restore or permanently delete tasks below.'
    : 'Only admins can restore or permanently delete tasks.';

  el.innerHTML = `<div class="tx3 mb12">${adminNote}</div>` + all.map(item=>{
    const isLit = item._mod === 'Litigation';
    const details = isLit
      ? [item.act, item.type, item.fy?'FY '+item.fy:'', item.status, item.authority, item.amount?'₹'+item.amount:''].filter(Boolean).join(' · ')
      : [item.form, item.fy?'FY '+item.fy:'', item.status, item.srn?'SRN: '+item.srn:''].filter(Boolean).join(' · ');

    const badges = [
      mkBadge(item._mod, isLit ? 'primary' : 'neutral'),
      `<span class="tx4">Deleted ${fmtDate(item.deletedAt)||'recently'} by <b>${esc(item.deletedBy||'?')}</b></span>`,
    ];

    const actions = isAdmin ? `
      <div class="flex-c gap8 mt10">
        <button class="btn btn-outline" style="font-size:12px" onclick="viewDeletedTask('${item._mod}','${item.id}')">👁 View</button>
        <button class="btn btn-primary" style="font-size:12px" onclick="restoreDeletedTask('${item._mod}','${item.id}')">↩ Restore</button>
        <button class="btn btn-danger"  style="font-size:12px" onclick="permanentlyDelete('${item._mod}','${item.id}')">🗑 Delete Forever</button>
      </div>` : `
      <div class="mt8">
        <button class="btn btn-outline" style="font-size:12px" onclick="viewDeletedTask('${item._mod}','${item.id}')">👁 View Details</button>
      </div>`;

    return `<div class="card mb10">
      <div class="tx1 mb4">${esc(item.client||'')}</div>
      <div class="tx3 mb6">${esc(details)}</div>
      ${item.desc?`<div class="tx4 mb6" style="font-style:italic">${esc(item.desc)}</div>`:''}
      <div class="flex-c gap6" style="flex-wrap:wrap">${badges.join('')}</div>
      ${actions}
    </div>`;
  }).join('');
}

function viewDeletedTask(module, id){
  const items = module==='Litigation' ? ls('ca_deleted_lit',[]) : ls('ca_deleted_roc',[]);
  const item = items.find(x=>x.id===id); if(!item) return;
  const isLit = module==='Litigation';
  const rows = isLit ? [
    ['Client',        item.client||''],
    ['Act',           item.act||''],
    ['Type',          item.type||''],
    ['Financial Year',item.fy||((item.fyFrom||'')+(item.fyTo?' to '+item.fyTo:''))||''],
    ['Description',   item.desc||''],
    ['Status',        item.status||''],
    ['Authority',     item.authority||''],
    ['Amount',        item.amount?'₹'+item.amount:''],
    ['Deadline',      fmtDate(item.deadline)||''],
    ['Remarks',       item.remarks||''],
    ['Team',          (item.team||[]).join(', ')||'None'],
    ['Created',       item.createdAt||''],
    ['Deleted by',    item.deletedBy||''],
    ['Deleted on',    fmtDate(item.deletedAt)||''],
  ] : [
    ['Client',        item.client||''],
    ['Form',          item.form||''],
    ['Financial Year',item.fy||''],
    ['Description',   item.desc||''],
    ['Status',        item.status||''],
    ['Due Date',      fmtDate(item.due)||''],
    ['Date Filed',    fmtDate(item.filed)||''],
    ['SRN',           item.srn||''],
    ['Fee',           item.fee?'₹'+item.fee:''],
    ['Remarks',       item.remarks||''],
    ['Team',          (item.team||[]).join(', ')||'None'],
    ['Created',       item.createdAt||''],
    ['Deleted by',    item.deletedBy||''],
    ['Deleted on',    fmtDate(item.deletedAt)||''],
  ];
  const html=`<div style="padding:4px 0">
    ${rows.filter(r=>r[1]).map(r=>`
      <div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
        <div style="font-size:12px;font-weight:600;color:var(--text2);width:110px;flex-shrink:0">${r[0]}</div>
        <div style="font-size:13px">${esc(r[1])}</div>
      </div>`).join('')}
  </div>`;
  showAlert(isLit?`${item.client} — ${item.act}`:item.client, html);
}

function showAlert(title, html){
  // Simple modal to show details
  let m=document.getElementById('_alertMdl');
  if(!m){
    m=document.createElement('div');
    m.id='_alertMdl';
    m.className='modal-bg';
    m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px';
    m.innerHTML=`<div class="modal" style="max-width:500px;max-height:80vh;overflow-y:auto">
      <div class="modal-hdr"><span id="_alertTitle"></span><button class="modal-close" onclick="document.getElementById('_alertMdl').style.display='none'">✕</button></div>
      <div id="_alertBody" style="padding:0 2px"></div>
    </div>`;
    m.addEventListener('click',e=>{ if(e.target===m) m.style.display='none'; });
    document.body.appendChild(m);
  }
  document.getElementById('_alertTitle').textContent=title;
  document.getElementById('_alertBody').innerHTML=html;
  m.style.display='flex';
}

function restoreDeletedTask(module, id){
  if(currentUser?.role!=='admin'){ toast('Admin only'); return; }
  const isLit = module==='Litigation';
  const delItems = ls(isLit?'ca_deleted_lit':'ca_deleted_roc',[]);
  const item = delItems.find(x=>x.id===id); if(!item) return;
  showConfirm(`Restore "${item.client}" task back to ${module}?`, ()=>{
    // Remove from deleted list
    const remaining = delItems.filter(x=>x.id!==id);
    lsSet(isLit?'ca_deleted_lit':'ca_deleted_roc', remaining);
    if(_dbOK) dbDelete(isLit?'ca_deleted_lit':'ca_deleted_roc', id);
    // Add back to active list
    const {deletedAt, deletedBy, _module, _label, ...restored} = item;
    restored.restoredAt = today();
    restored.restoredBy = currentUser?.username||'admin';
    if(isLit){
      const cases = ls('ca_cases',[]); cases.unshift(restored);
      lsSet('ca_cases', cases);
      if(_dbOK) dbSave('ca_cases', restored.id, restored);
    } else {
      const roc = ls('ca_roc',[]); roc.unshift(restored);
      lsSet('ca_roc', roc);
      if(_dbOK) dbSave('ca_roc', restored.id, restored);
    }
    toast(`Task restored to ${module} ✓`);
    renderDeletedTasks();
    updateLauncherTabCounts();
  });
}

function permanentlyDelete(module, id){
  if(currentUser?.role!=='admin'){ toast('Admin only'); return; }
  showConfirm('Permanently delete this task? This CANNOT be undone.',()=>{
    if(module==='Litigation'){
      _mem.ca_deleted_lit = (_mem.ca_deleted_lit||[]).filter(x=>x.id!==id);
      if(_dbOK) dbDelete('ca_deleted_lit', id);
    } else {
      _mem.ca_deleted_roc = (_mem.ca_deleted_roc||[]).filter(x=>x.id!==id);
      if(_dbOK) dbDelete('ca_deleted_roc', id);
    }
    toast('Permanently deleted ✓');
    renderDeletedTasks();
    updateLauncherTabCounts();
  });
}
